<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Ataque De Pánico</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap');
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Share Tech Mono',monospace}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=480,H=720;
C.width=W;C.height=H;
function resize(){const s=Math.min(innerWidth/W,innerHeight/H);C.style.width=W*s+'px';C.style.height=H*s+'px';}
resize();addEventListener('resize',resize);

// ══ AUDIO ══════════════════════════════════════════════════
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,tp='square',v=0.2,sweep=1){
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.type=tp;o.frequency.setValueAtTime(f,AC.currentTime);
  if(sweep!==1)o.frequency.exponentialRampToValueAtTime(f*sweep,AC.currentTime+d);
  g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
  o.start();o.stop(AC.currentTime+d);}catch(e){}
}
const sfx={
  shoot:()=>tone(1100,.055,'square',.08),
  rocket:()=>tone(350,.16,'sawtooth',.16,.35),
  exp:(big)=>{tone(big?60:120,big?.8:.35,'sawtooth',big?.45:.28,.08);if(big)tone(100,.5,'square',.18,.1);},
  powerup:()=>{tone(440,.09,'sine',.28);setTimeout(()=>tone(660,.09,'sine',.28),100);setTimeout(()=>tone(880,.12,'sine',.28),200);},
  bossHit:()=>tone(180,.09,'sawtooth',.14,.7),
  warning:()=>{tone(300,.25,'square',.4,.5);setTimeout(()=>tone(300,.25,'square',.4,.5),350);},
  select:()=>tone(660,.08,'sine',.22),
  start:()=>{tone(330,.1,'sine',.3);setTimeout(()=>tone(440,.1,'sine',.3),120);setTimeout(()=>tone(550,.2,'sine',.3),240);},
};
function resumeAC(){if(AC.state==='suspended')AC.resume();}

// ══ INPUT ══════════════════════════════════════════════════
const K={};let anyKey=false,twoFinger=false;
// Touch joystick: relative drag
let touchId=null,touchStartX=0,touchStartY=0,touchDX=0,touchDY=0,touchActive=false;
let touch2Id=null,specialFired=false;
addEventListener('keydown',e=>{K[e.code]=true;resumeAC();anyKey=true;});
addEventListener('keyup',e=>{K[e.code]=false;});
// Tap tracking for menus
let lastTapT=0,tapX=0,tapY=0,tapFired=false;
function getTapCanvas(cx,cy){const r=C.getBoundingClientRect(),sc=W/r.width;return{x:(cx-r.left)*sc,y:(cy-r.top)*sc};}
C.addEventListener('touchstart',e=>{
  e.preventDefault();resumeAC();anyKey=true;
  const r=C.getBoundingClientRect(),sc=W/r.width;
  for(const t of e.changedTouches){
    if(touchId===null){
      touchId=t.identifier;
      touchStartX=t.clientX;touchStartY=t.clientY;
      touchDX=0;touchDY=0;touchActive=true;
      // record tap position in canvas coords
      tapX=(t.clientX-r.left)*sc;tapY=(t.clientY-r.top)*sc;tapFired=false;
    } else if(touch2Id===null){
      touch2Id=t.identifier;twoFinger=true;specialFired=false;
    }
  }
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touchId){
      touchDX=t.clientX-touchStartX;
      touchDY=t.clientY-touchStartY;
    }
  }
},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touchId){
      // Fire tap if finger didn't move much
      if(!tapFired&&Math.hypot(touchDX,touchDY)<20){handleTap(tapX,tapY);}
      touchId=null;touchDX=0;touchDY=0;touchActive=false;
    }
    if(t.identifier===touch2Id){touch2Id=null;twoFinger=false;}
  }
},{passive:false});
C.addEventListener('click',()=>{resumeAC();anyKey=true;});
function handleTap(tx,ty){
  tapFired=true;
  if(STATE==='title'){anyKey=true;return;}
  if(STATE==='select'){
    const newSel=tx<W/2?0:1;
    if(newSel===selPlane){// already selected — start
      initGame();
    }else{
      selPlane=newSel;sfx.select();
    }
    return;
  }
  if(STATE==='gameover'){initGame();return;}
  if(STATE==='missioncomplete'){STATE='title';Object.keys(K).forEach(k=>K[k]=false);return;}
}

// ══ UTILS ══════════════════════════════════════════════════
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndI=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const ph=(n)=>((Math.sin(n*127.1)*43758.5453)%1+1)%1;
function fmt(n,z=6){return String(Math.floor(n)).padStart(z,'0');}

// ══ STATE ══════════════════════════════════════════════════
let STATE='title'; // title|select|playing|warning|levelclear|missioncomplete|gameover|win
let selPlane=0,level=0,score=0,hiScore=0,bombs=2;
let combo=0,comboT=0,shake=0,bgY=0,frame=0;
let levelT=0,bossActive=false,bossWarning=0;
let levelClearT=0,missionScore=0,bonusScore=0;
let spawnQ=[],player=null,bullets=[],enemies=[],particles=[],powerups=[],boss=null;

function shk(a){shake=Math.max(shake,a);}
function addScore(pts){
  const m=combo>5?3:combo>2?2:1;score+=pts*m;
  combo++;comboT=120;if(score>hiScore)hiScore=score;
}

// ══ DRAW UTILS ══════════════════════════════════════════════
function glow(c,b=12){X.shadowBlur=b;X.shadowColor=c;}
function noGlow(){X.shadowBlur=0;}

function metalRect(x,y,w,h,dark='#1a1410',light='#3a2e20',border='#7a6030'){
  const g=X.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,light);g.addColorStop(0.5,dark);g.addColorStop(1,light);
  X.fillStyle=g;X.fillRect(x,y,w,h);
  X.strokeStyle=border;X.lineWidth=1.5;X.strokeRect(x+.75,y+.75,w-1.5,h-1.5);
  // inner bevel
  X.strokeStyle='rgba(255,200,80,.08)';X.lineWidth=1;X.strokeRect(x+2,y+2,w-4,h-4);
}

function goldText(t,x,y,sz=14,align='center'){
  X.textAlign=align;X.font=`bold ${sz}px 'Share Tech Mono',monospace`;
  glow('#ffcc00',10);X.fillStyle='#ffe566';X.fillText(t,x,y);noGlow();
}

function militaryText(t,x,y,sz=12,color='#ccaa44',align='center'){
  X.textAlign=align;X.font=`bold ${sz}px 'Share Tech Mono',monospace`;
  X.fillStyle=color;X.fillText(t,x,y);
}

// Corner decoration
function corners(x,y,w,h,sz=10,c='#7a6030'){
  X.strokeStyle=c;X.lineWidth=2;
  const cs=[[x,y,1,1],[x+w,y,-1,1],[x,y+h,1,-1],[x+w,y+h,-1,-1]];
  cs.forEach(([cx,cy,dx,dy])=>{X.beginPath();X.moveTo(cx+dx*sz,cy);X.lineTo(cx,cy);X.lineTo(cx,cy+dy*sz);X.stroke();});
}

// ══ CINEMATIC BACKGROUNDS ══════════════════════════════════
// ══ TOP-DOWN AERIAL BACKGROUNDS ═══════════════════════════

// Seeded pseudo-random for stable city layout
function ph2(x,y){return((Math.sin(x*127.1+y*311.7+113.5)*43758.5453)%1+1)%1;}

// ── LEVEL 0: RAMBLA SUR — coastal city + rio de la plata ──
function drawRambla(scroll){
  const s=scroll;
  // Río de la Plata — right side, murky brown-blue water
  const wg=X.createLinearGradient(W*.55,0,W,0);
  wg.addColorStop(0,'#1a2e3a');wg.addColorStop(.4,'#1e3a2e');wg.addColorStop(1,'#162a22');
  X.fillStyle=wg;X.fillRect(W*.55,0,W*.45,H);
  // Water ripples
  X.strokeStyle='rgba(40,80,70,.3)';X.lineWidth=1;
  for(let i=0;i<28;i++){
    const wy=((i*38+s*.6)%H+H)%H;
    const wx=W*.58+ph2(i,0)*W*.36;
    const wl=20+ph2(i,1)*35;
    X.beginPath();X.moveTo(wx,wy);X.quadraticCurveTo(wx+wl*.5,wy-3,wx+wl,wy);X.stroke();
  }
  // Foam/wake at shore line
  X.fillStyle='rgba(80,130,110,.15)';
  for(let i=0;i<6;i++){
    const fy=((i*90+s*.4)%H+H)%H;
    X.beginPath();X.ellipse(W*.565,fy,18,6,0,0,Math.PI*2);X.fill();
  }

  // Ships in water (small top-down)
  for(let si=0;si<3;si++){
    const sy=((si*280+120+s*.35)%H+H)%H;
    const sx=W*.65+ph2(si,9)*W*.25;
    drawShip(sx,sy,si);
  }

  // Rambla road — light grey strip along coast
  X.fillStyle='#2e2e28';X.fillRect(W*.48,0,W*.09,H);
  // Road markings
  X.fillStyle='rgba(255,255,200,.18)';
  for(let i=0;i<22;i++){
    const my=((i*55+s*.9)%H+H)%H;
    X.fillRect(W*.523,my,3,28);
  }
  // Sidewalk
  X.fillStyle='#3a3630';X.fillRect(W*.45,0,W*.035,H);
  X.fillStyle='#444038';X.fillRect(W*.545,0,W*.038,H);

  // City blocks — left 45% of screen
  drawCityGrid(0,W*.44,s,0);

  // Beach/waterfront strip
  const bg2=X.createLinearGradient(W*.44,0,W*.56,0);
  bg2.addColorStop(0,'#3a3020');bg2.addColorStop(.5,'#504838');bg2.addColorStop(1,'#2e2e28');
  X.fillStyle=bg2;X.fillRect(W*.44,0,W*.04,H);
  // Beach textures (small dots)
  X.fillStyle='rgba(200,180,120,.08)';
  for(let i=0;i<40;i++){
    X.beginPath();X.arc(W*.45+ph2(i,3)*W*.02,((i*37+s*.2)%H+H)%H,2,0,Math.PI*2);X.fill();
  }

  // Fire/explosion effects on buildings
  drawAerialFires(0,W*.42,s,6,22);
}

// ── LEVEL 1: CENTRO / PALACIO SALVO — dense urban grid ──
function drawCentro(scroll){
  const s=scroll;
  // Base asphalt color
  X.fillStyle='#1e1c18';X.fillRect(0,0,W,H);
  // Full city grid
  drawCityGrid(0,W,s,1);
  // Main avenue (18 de Julio) — wide diagonal
  X.fillStyle='#2a2820';X.fillRect(W*.3,0,W*.08,H);
  X.fillStyle='rgba(255,255,150,.12)';
  for(let i=0;i<18;i++){
    const my=((i*62+s)%H+H)%H;
    X.fillRect(W*.335,my,4,32);
  }
  // Palacio Salvo as top-down landmark
  const psy=((350+s*.15)%H+H)%H;
  drawPalacioTopDown(W*.38,psy);
  // Plaza Independencia — open square
  const plsy=((500+s*.15)%H+H)%H;
  X.fillStyle='#2a3020';X.fillRect(W*.32,plsy,W*.12,55);
  X.strokeStyle='rgba(80,120,50,.4)';X.lineWidth=1;X.strokeRect(W*.32,plsy,W*.12,55);
  // Fountain
  X.fillStyle='rgba(30,80,100,.6)';X.beginPath();X.arc(W*.38,plsy+27,8,0,Math.PI*2);X.fill();
  // Trees in plaza
  for(let i=0;i<6;i++){
    const tx=W*.325+i*(W*.019);
    X.fillStyle='#1e3010';X.beginPath();X.arc(tx,plsy+8,4,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(tx,plsy+48,4,0,Math.PI*2);X.fill();
  }
  drawAerialFires(0,W,s,12,18);
}

// ── LEVEL 2: PUERTO / CIUDAD VIEJA — port + old city ──
function drawPuerto(scroll){
  const s=scroll;
  // Water — left 35%
  const wg=X.createLinearGradient(0,0,W*.38,0);
  wg.addColorStop(0,'#0e1e28');wg.addColorStop(1,'#182e22');
  X.fillStyle=wg;X.fillRect(0,0,W*.38,H);
  // Murky water ripples
  X.strokeStyle='rgba(20,60,50,.4)';X.lineWidth=1;
  for(let i=0;i<20;i++){
    const wy=((i*44+s*.5)%H+H)%H;
    X.beginPath();X.moveTo(ph2(i,2)*W*.3,wy);X.lineTo(ph2(i,2)*W*.3+30+ph2(i,5)*25,wy);X.stroke();
  }
  // Docked ships (big, top-down)
  for(let si=0;si<4;si++){
    const sy=((si*200+60+s*.3)%(H+100)-50+H)%H;
    drawShip(ph2(si,7)*W*.28+15,sy,si+3);
  }
  // Pier / dock structures
  X.fillStyle='#2e2418';
  X.fillRect(W*.3,0,W*.06,H);
  // Dock crane shadows from above
  for(let i=0;i<5;i++){
    const cy=((i*160+s*.2)%H+H)%H;
    X.fillStyle='rgba(40,30,20,.8)';
    X.fillRect(W*.31,cy,22,5);X.fillRect(W*.31+20,cy-18,5,22);
  }
  // City grid — right 60%
  drawCityGrid(W*.38,W*.62,s,2);
  // Old city narrow streets overlay
  X.fillStyle='rgba(0,0,0,.15)';
  for(let i=0;i<8;i++){
    const gy=((i*95+s*.8)%H+H)%H;
    X.fillRect(W*.4,gy,W*.58,2);
  }
  drawAerialFires(W*.38,W*.6,s,14,14);
}

// ── CITY GRID GENERATOR (top-down manzanas) ──
function drawCityGrid(startX,widthX,scroll,lvl){
  const s=scroll;
  const blockW=58,blockH=62,streetW=10;
  const cols=Math.ceil(widthX/(blockW+streetW))+2;
  const rows=Math.ceil(H/(blockH+streetW))+2;

  // Street base
  const streetCol=['#1e1c18','#1c1a16','#1a181a'][lvl];
  X.fillStyle=streetCol;X.fillRect(startX,0,widthX,H);

  // Street grid lines
  X.strokeStyle='rgba(60,55,40,.25)';X.lineWidth=1;
  for(let c=0;c<cols;c++){
    const gx=startX+((c*(blockW+streetW)-s*.05)%(widthX+blockW)+widthX)%widthX;
    X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke();
    if(gx+blockW<startX+widthX){X.beginPath();X.moveTo(gx+blockW,0);X.lineTo(gx+blockW,H);X.stroke();}
  }
  for(let r=0;r<rows;r++){
    const gy=((r*(blockH+streetW)-s)%(H+blockH)+H+blockH)%H-blockH;
    X.beginPath();X.moveTo(startX,gy);X.lineTo(startX+widthX,gy);X.stroke();
    if(gy+blockH<H){X.beginPath();X.moveTo(startX,gy+blockH);X.lineTo(startX+widthX,gy+blockH);X.stroke();}
  }

  // Draw each city block
  for(let c=0;c<cols;c++){
    for(let r=0;r<rows;r++){
      const bx=startX+((c*(blockW+streetW)+s*.02)%(widthX+blockW+streetW)+widthX+blockW+streetW)%(widthX+blockW+streetW)-blockW;
      const by=((r*(blockH+streetW)+s)%(H+blockH+streetW)+H+blockH+streetW)%(H+blockH+streetW)-blockH;
      if(bx>startX+widthX+10||bx+blockW<startX-10)continue;
      drawCityBlock(bx,by,blockW,blockH,c,r,lvl,s);
    }
  }

  // Street markings (dashed center lines)
  X.setLineDash([18,14]);
  X.strokeStyle='rgba(200,180,80,.1)';X.lineWidth=1;
  for(let c=0;c<cols;c++){
    const gx=startX+((c*(blockW+streetW)+s*.02)%(widthX+blockW+streetW)+widthX)%widthX;
    X.beginPath();X.moveTo(gx+blockW+streetW*.5,0);X.lineTo(gx+blockW+streetW*.5,H);X.stroke();
  }
  for(let r=0;r<rows;r++){
    const gy=((r*(blockH+streetW)+s)%(H+blockH+streetW)+H+blockH)%(H+blockH+streetW)-blockH+blockH+streetW*.5;
    X.beginPath();X.moveTo(startX,gy);X.lineTo(startX+widthX,gy);X.stroke();
  }
  X.setLineDash([]);
}

function drawCityBlock(bx,by,bw,bh,col,row,lvl,scroll){
  const seed=col*73+row*37+lvl*13;
  const blockType=Math.floor(ph2(col*3,row*3)*4); // 0=solid, 1=courtyard, 2=small bldgs, 3=park

  if(blockType===3&&ph2(col,row)>.6){
    // Park / green space
    X.fillStyle=lvl===2?'#162010':'#1c2812';
    X.fillRect(bx,by,bw,bh);
    // Trees (circles from above)
    const nt=3+Math.floor(ph2(col*2,row*2)*5);
    for(let t=0;t<nt;t++){
      const tx=bx+5+ph2(seed+t,1)*(bw-10);
      const ty=by+5+ph2(seed+t,2)*(bh-10);
      const tr=3+ph2(seed+t,3)*4;
      // Tree shadow
      X.fillStyle='rgba(0,0,0,.3)';X.beginPath();X.arc(tx+2,ty+2,tr,0,Math.PI*2);X.fill();
      // Tree canopy (dark green blob from above)
      const tg=X.createRadialGradient(tx-1,ty-1,0,tx,ty,tr);
      tg.addColorStop(0,lvl===2?'#1e3010':'#223814');
      tg.addColorStop(.6,lvl===2?'#162208':'#1a2c0a');
      tg.addColorStop(1,'rgba(10,20,5,0)');
      X.fillStyle=tg;X.beginPath();X.arc(tx,ty,tr,0,Math.PI*2);X.fill();
    }
    return;
  }

  // Building block colors by level
  const roofCols=[
    ['#2a2820','#262420','#222018','#2e2c22'],  // lvl0 neutral
    ['#1e1c20','#221e1e','#1a1818','#242020'],  // lvl1 dark
    ['#1a201a','#181e16','#1c1e18','#202218'],  // lvl2 greenish
  ];
  const roofC=roofCols[lvl][Math.floor(ph2(col,row)*4)];

  // Damage tint (level progression)
  const dmgAmt=Math.min(1,(frame-200)/800);

  if(blockType===1&&bw>35){
    // Courtyard block — building with inner court
    X.fillStyle=roofC;X.fillRect(bx,by,bw,bh);
    const cw=bw*.38,ch=bh*.35;
    const cx2=bx+(bw-cw)*.5,cy2=by+(bh-ch)*.5;
    X.fillStyle=lvl===2?'#101610':'#141210';
    X.fillRect(cx2,cy2,cw,ch);
    // Roof edge highlight
    X.strokeStyle='rgba(255,230,150,.07)';X.lineWidth=1;X.strokeRect(bx+.5,by+.5,bw-1,bh-1);
  } else if(blockType===2){
    // Multiple smaller buildings
    X.fillStyle='#161412';X.fillRect(bx,by,bw,bh); // base alley
    const nb=2+Math.floor(ph2(seed,4)*3);
    for(let b=0;b<nb;b++){
      const sbx=bx+ph2(seed+b,5)*(bw*.6);
      const sby=by+ph2(seed+b,6)*(bh*.6);
      const sbw=10+ph2(seed+b,7)*20;
      const sbh=10+ph2(seed+b,8)*20;
      X.fillStyle=roofC;X.fillRect(sbx,sby,Math.min(sbw,bx+bw-sbx-2),Math.min(sbh,by+bh-sby-2));
      X.strokeStyle='rgba(255,230,150,.05)';X.lineWidth=.8;
      X.strokeRect(sbx,sby,Math.min(sbw,bx+bw-sbx-2),Math.min(sbh,by+bh-sby-2));
    }
  } else {
    // Solid block
    const rg=X.createLinearGradient(bx,by,bx+bw,by+bh);
    const dc=dmgAmt>.3?`rgba(255,40,0,${(dmgAmt-.3)*.15})`:'rgba(0,0,0,0)';
    rg.addColorStop(0,roofC);rg.addColorStop(.5,adjustColor(roofC,8));rg.addColorStop(1,roofC);
    X.fillStyle=rg;X.fillRect(bx,by,bw,bh);
    if(dmgAmt>.3){X.fillStyle=dc;X.fillRect(bx,by,bw,bh);}
    // Roof edge highlight (top-left lit, bottom-right shadow)
    X.strokeStyle='rgba(255,230,150,.06)';X.lineWidth=1;
    X.beginPath();X.moveTo(bx,by+bh);X.lineTo(bx,by);X.lineTo(bx+bw,by);X.stroke();
    X.strokeStyle='rgba(0,0,0,.2)';
    X.beginPath();X.moveTo(bx+bw,by);X.lineTo(bx+bw,by+bh);X.lineTo(bx,by+bh);X.stroke();
    // Rooftop details (AC units, water tanks)
    if(ph2(col+1,row+1)>.5){
      X.fillStyle='rgba(0,0,0,.3)';
      X.fillRect(bx+bw*.2,by+bh*.2,bw*.12,bh*.12);
      X.fillRect(bx+bw*.6,by+bh*.6,bw*.1,bh*.1);
    }
    // Shadow on street (south+east side) — gives 3D feel
    X.fillStyle='rgba(0,0,0,.22)';
    X.fillRect(bx+bw,by+3,4,bh);  // east shadow
    X.fillRect(bx+3,by+bh,bw,4);  // south shadow
  }
}

function adjustColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ── PALACIO SALVO TOP-DOWN ──
function drawPalacioTopDown(x,y){
  // Octagonal tower footprint from above
  X.fillStyle='#2a2030';
  X.beginPath();
  for(let i=0;i<8;i++){const a=i*Math.PI/4-Math.PI/8;X.lineTo(x+Math.cos(a)*16,y+Math.sin(a)*16);}
  X.closePath();X.fill();
  // Wings
  X.fillRect(x-28,y-8,56,16);
  X.fillStyle='#221828';
  X.fillRect(x-24,y-4,48,8);
  // Roof details
  X.fillStyle='rgba(255,200,80,.08)';
  for(let i=0;i<8;i++){const a=i*Math.PI/4-Math.PI/8;
    X.beginPath();X.arc(x+Math.cos(a)*10,y+Math.sin(a)*10,2,0,Math.PI*2);X.fill();}
  // Spire shadow from above (offset circle)
  X.fillStyle='rgba(0,0,0,.4)';X.beginPath();X.arc(x+3,y+3,5,0,Math.PI*2);X.fill();
  X.fillStyle='#362040';X.beginPath();X.arc(x,y,5,0,Math.PI*2);X.fill();
  // Fire/destruction
  X.fillStyle='rgba(255,60,0,.2)';X.fillRect(x-28,y-8,56,16);
}

// ── SHIPS (top-down) ──
function drawShip(x,y,type){
  X.save();X.translate(x,y);
  const configs=[
    {l:38,w:9,c:'#3a3220',wake:true},   // fishing boat
    {l:55,w:12,c:'#2e3028',wake:true},  // cargo ship
    {l:30,w:7,c:'#2a2818',wake:false},  // small boat
    {l:70,w:16,c:'#2a2c30',wake:true},  // cargo freighter
    {l:45,w:11,c:'#303228',wake:true},  // patrol boat
    {l:62,w:14,c:'#282a2c',wake:true},  // destroyer
  ];
  const cfg=configs[type%configs.length];
  // Wake trail
  if(cfg.wake){
    X.fillStyle='rgba(60,100,90,.2)';
    X.beginPath();X.moveTo(0,cfg.l*.5);X.lineTo(-cfg.w*.6,cfg.l*1.4);X.lineTo(cfg.w*.6,cfg.l*1.4);X.closePath();X.fill();
  }
  // Hull shadow
  X.fillStyle='rgba(0,0,0,.25)';X.fillRect(-cfg.w*.5+2,(-cfg.l*.5)+2,cfg.w,cfg.l);
  // Hull
  const hg=X.createLinearGradient(-cfg.w*.5,0,cfg.w*.5,0);
  hg.addColorStop(0,adjustColor(cfg.c,-6));hg.addColorStop(.5,cfg.c);hg.addColorStop(1,adjustColor(cfg.c,-6));
  X.fillStyle=hg;
  X.beginPath();X.moveTo(0,-cfg.l*.5);X.bezierCurveTo(cfg.w*.5,-cfg.l*.3,cfg.w*.5,cfg.l*.3,0,cfg.l*.5);
  X.bezierCurveTo(-cfg.w*.5,cfg.l*.3,-cfg.w*.5,-cfg.l*.3,0,-cfg.l*.5);X.closePath();X.fill();
  // Superstructure
  X.fillStyle=adjustColor(cfg.c,10);X.fillRect(-cfg.w*.25,-cfg.l*.15,cfg.w*.5,cfg.l*.22);
  X.fillStyle=adjustColor(cfg.c,18);X.fillRect(-cfg.w*.15,-cfg.l*.08,cfg.w*.3,cfg.l*.1);
  X.restore();
}

// ── AERIAL FIRE/DESTRUCTION EFFECTS ──
function drawAerialFires(startX,widthX,scroll,count,seed){
  for(let i=0;i<count;i++){
    const fx=startX+ph2(seed+i,1)*widthX;
    const fy=((ph2(seed+i,2)*H*2+scroll*.3)%H+H)%H;
    const fr=8+ph2(seed+i,3)*18;
    const flk=.7+Math.sin(frame*.22+i)*0.3;
    // Smoke
    X.fillStyle=`rgba(15,10,8,${.35*flk})`;
    X.beginPath();X.ellipse(fx,fy-fr*.8,fr*.7,fr*1.1*flk,0,0,Math.PI*2);X.fill();
    // Fire glow on ground
    const fg2=X.createRadialGradient(fx,fy,0,fx,fy,fr*flk);
    fg2.addColorStop(0,`rgba(255,180,30,.7)`);
    fg2.addColorStop(.4,`rgba(255,60,0,.4)`);
    fg2.addColorStop(1,'rgba(200,30,0,0)');
    X.fillStyle=fg2;X.beginPath();X.ellipse(fx,fy,fr*.6*flk,fr*.4*flk,0,0,Math.PI*2);X.fill();
  }
}

// ── STARS / DEBRIS overlay ──
function drawDebris(scroll){

  }
}

// ══ PLAYER CLASS ════════════════════════════════════════════
class Player{
  constructor(type){
    this.type=type;this.x=W/2;this.y=H-120;
    this.hp=type===0?3:4;this.maxHp=this.hp;
    this.spd=type===0?5.8:4.5;
    this.sft=type===0?9:14; // shoot frame timer
    this.st=0;this.wl=0;this.special=100;this.spCool=0;
    this.shield=0;this.inv=0;this.dmg=0;this.dead=false;
    this.trail=[];this.boostFx=0;
  }
  update(){
    let dx=0,dy=0;
    if(K['ArrowLeft']||K['KeyA'])dx=-1;
    if(K['ArrowRight']||K['KeyD'])dx=1;
    if(K['ArrowUp']||K['KeyW'])dy=-1;
    if(K['ArrowDown']||K['KeyS'])dy=1;
    if(touchActive){const tl=Math.hypot(touchDX,touchDY);if(tl>8){const sc2=Math.min(tl/40,1);dx=touchDX/tl*sc2;dy=touchDY/tl*sc2;}}
    const sp=this.spd*(dx&&dy?.707:1);
    this.x=clamp(this.x+dx*sp,22,W-22);this.y=clamp(this.y+dy*sp,44,H-52);
    this.trail.push({x:this.x,y:this.y+24});if(this.trail.length>12)this.trail.shift();
    // Shoot
    this.st--;if(this.st<=0){this.fire();this.st=this.sft;}
    // Special
    if((K["Space"]||K["KeyX"]||(twoFinger&&!specialFired))&&this.special>=100&&this.spCool<=0){this.activateSpecial();if(twoFinger)specialFired=true;}
    if(this.spCool>0)this.spCool--;
    if(this.special<100)this.special=Math.min(100,this.special+.14);
    if(this.inv>0)this.inv--;if(this.dmg>0)this.dmg--;if(this.shield>0)this.shield--;
    if(this.boostFx>0)this.boostFx--;
  }
  fire(){
    if(this.type===0){// A-29 precision lasers
      if(this.wl===0){bullets.push(mkB(this.x,this.y-30,0,-15,true,1,'laser'));sfx.shoot();}
      else if(this.wl===1){bullets.push(mkB(this.x-10,this.y-28,0,-15,true,1,'laser'));bullets.push(mkB(this.x+10,this.y-28,0,-15,true,1,'laser'));sfx.shoot();}
      else{bullets.push(mkB(this.x,this.y-30,0,-16,true,2,'laser'));bullets.push(mkB(this.x-13,this.y-27,-.45,-15,true,1,'laser'));bullets.push(mkB(this.x+13,this.y-27,.45,-15,true,1,'laser'));sfx.shoot();}
    }else{// A-37 rockets
      if(this.wl===0){bullets.push(mkB(this.x-11,this.y-28,0,-10,true,2,'rocket'));bullets.push(mkB(this.x+11,this.y-28,0,-10,true,2,'rocket'));sfx.rocket();}
      else if(this.wl===1){for(let i=-1;i<=1;i++)bullets.push(mkB(this.x+i*12,this.y-28,i*.35,-10,true,2,'rocket'));sfx.rocket();}
      else{for(let i=-2;i<=2;i++)bullets.push(mkB(this.x+i*11,this.y-28,i*.42,-11,true,2+(Math.abs(i)<2?1:0),'rocket'));sfx.rocket();}
    }
  }
  activateSpecial(){
    this.special=0;this.spCool=200;this.boostFx=30;
    if(this.type===0){// Guided precision strike
      let ts=enemies.filter(e=>!e.dead).sort((a,b)=>a.y-b.y).slice(0,8);
      if(boss&&!boss.dead)ts=[boss,...ts.slice(0,7)];
      ts.forEach((t,i)=>setTimeout(()=>{if(STATE==='playing'&&!t.dead){bullets.push(mkGuided(this.x,this.y,t));sfx.rocket();}},i*70));
      ptcl(this.x,this.y,'#ffee88',24);shk(5);
    }else{// Saturation bombing
      if(bombs>0){
        bombs--;
        for(let i=0;i<20;i++)setTimeout(()=>{
          if(STATE==='playing'){bullets.push(mkB(rnd(20,W-20),-10,0,14,true,3,'bomb'));sfx.exp();}
        },i*55);
        shk(7);
      }else{// Alt: spray rockets
        for(let a=-2;a<=2;a++){
          for(let i=0;i<3;i++)setTimeout(()=>{bullets.push(mkB(this.x,this.y-28,a*.7,-12,true,2,'rocket'))},i*40);
        }
        ptcl(this.x,this.y,'#ff8800',16);shk(5);
      }
    }
  }
  hit(dmg=1){
    if(this.inv>0)return;
    if(this.shield>0){this.shield=0;shk(6);ptcl(this.x,this.y,'#00aaff',16);return;}
    this.hp-=dmg;this.inv=95;this.dmg=22;shk(10);
    ptcl(this.x,this.y,'#ff4400',22);sfx.exp();
    if(this.hp<=0){bigExp(this.x,this.y);STATE='gameover';}
  }
  draw(){
    // Engine trail
    this.trail.forEach((p,i)=>{
      const a=i/this.trail.length;
      const c=this.type===0?`rgba(255,${120+a*60},0,${a*.35})`:`rgba(255,${80+a*40},0,${a*.3})`;
      X.fillStyle=c;X.beginPath();X.arc(p.x,p.y,4*a,0,Math.PI*2);X.fill();
    });
    X.save();
    if(this.dmg>0&&Math.floor(this.dmg/3)%2)X.globalAlpha=.2;
    else if(this.inv>0&&Math.floor(this.inv/5)%2)X.globalAlpha=.55;
    this.type===0?drawA29(this.x,this.y,1):drawA37(this.x,this.y,1);
    if(this.shield>0){
      X.globalAlpha=.5+Math.sin(frame*.02)*.2;
      X.strokeStyle='#00aaff';X.lineWidth=3;
      glow('#00aaff',14);X.beginPath();X.arc(this.x,this.y,38,0,Math.PI*2);X.stroke();noGlow();
    }
    X.globalAlpha=1;X.restore();
    if(this.boostFx>0){
      const a=this.boostFx/30;
      glow('#ffcc00',20);X.strokeStyle=`rgba(255,200,0,${a*.6})`;X.lineWidth=3;
      X.beginPath();X.arc(this.x,this.y,44,0,Math.PI*2);X.stroke();noGlow();
    }
  }
}

// ══ BULLETS ══════════════════════════════════════════════════
function mkB(x,y,vx,vy,friendly,dmg=1,type='laser'){return{x,y,vx,vy,friendly,dmg,type,dead:false,life:240,ph:0};}
function mkGuided(x,y,target){return{x,y,vx:0,vy:-8,friendly:true,dmg:4,type:'guided',dead:false,life:320,ph:0,target,spd:8,ang:-Math.PI/2};}

function updBullets(){
  bullets.forEach(b=>{
    if(b.dead)return;
    b.ph++;
    if(b.type==='guided'&&b.target&&!b.target.dead){
      const da=Math.atan2(b.target.y-b.y,b.target.x-b.x)-b.ang;
      b.ang+=((da+3*Math.PI)%(2*Math.PI)-Math.PI)*.1;
      b.vx=Math.cos(b.ang)*b.spd;b.vy=Math.sin(b.ang)*b.spd;
    }
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.y<-40||b.y>H+40||b.x<-40||b.x>W+40||b.life<=0){b.dead=true;return;}
    if(b.friendly){
      enemies.forEach(e=>{if(!e.dead&&!b.dead&&dist(b,e)<e.r){e.hit(b.dmg);b.dead=true;ptcl(b.x,b.y,'#ffaa22',4);}});
      if(boss&&!boss.dead&&!b.dead&&dist(b,boss)<boss.r){boss.hit(b.dmg);b.dead=true;sfx.bossHit();}
    }else{
      if(player&&!b.dead&&dist(b,player)<20)player.hit(b.dmg);
    }
  });
  bullets=bullets.filter(b=>!b.dead);
}

function drawBullets(){
  bullets.forEach(b=>{
    X.save();
    if(b.friendly){
      if(b.type==='laser'){
        glow('#ffe566',10);
        X.fillStyle='#fff8aa';X.fillRect(b.x-2,b.y-12,4,16);
        X.fillStyle='rgba(255,220,50,.5)';X.fillRect(b.x-1,b.y-12,2,16);
      }else if(b.type==='rocket'){
        glow('#ff8800',8);
        X.fillStyle='#ffaa33';X.beginPath();X.ellipse(b.x,b.y,3.5,9,0,0,Math.PI*2);X.fill();
        X.fillStyle='rgba(255,80,0,.7)';X.fillRect(b.x-2,b.y+7,4,5);
      }else if(b.type==='bomb'){
        glow('#ff6600',12);X.fillStyle='#ff8800';X.beginPath();X.arc(b.x,b.y,7,0,Math.PI*2);X.fill();
        X.fillStyle='#ffdd00';X.beginPath();X.arc(b.x,b.y,3.5,0,Math.PI*2);X.fill();
      }else if(b.type==='guided'){
        X.translate(b.x,b.y);X.rotate(b.ang+Math.PI/2);
        glow('#ff8800',12);X.fillStyle='#ffaa33';
        X.beginPath();X.moveTo(0,-11);X.lineTo(4.5,5);X.lineTo(-4.5,5);X.closePath();X.fill();
        X.fillStyle=`rgba(255,160,60,.7)`;X.beginPath();X.ellipse(0,9,2.5,6,0,0,Math.PI*2);X.fill();
      }
    }else{
      if(b.type==='beam'){
        const leg=X.createLinearGradient(b.x-3,b.y-14,b.x+3,b.y+4);
        leg.addColorStop(0,'rgba(255,80,0,0)');leg.addColorStop(.5,'rgba(255,60,0,.95)');leg.addColorStop(1,'rgba(200,0,0,0)');
        glow('#ff3300',8);X.fillStyle=leg;X.fillRect(b.x-3,b.y-14,6,18);
      }else{
        glow('#00ff66',6);X.fillStyle=`rgba(0,${140+b.ph%100},60,.9)`;
        X.beginPath();X.arc(b.x,b.y,4.5,0,Math.PI*2);X.fill();
      }
    }
    noGlow();X.restore();
  });
}

// ══ ENEMIES ══════════════════════════════════════════════════
class Enemy{
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;this.dead=false;
    this.ph=rnd(0,100);this.st=0;this.legPh=0;
    switch(type){
      case 'drone':      this.hp=1;this.r=14;this.sc=100;this.vx=rnd(-1.3,1.3);this.vy=rnd(1.8,2.8);this.st=rndI(70,120);break;
      case 'drone_fast': this.hp=1;this.r=12;this.sc=150;this.vx=rnd(-2.2,2.2);this.vy=rnd(3.5,5.2);this.st=rndI(40,80);break;
      case 'tripod':     this.hp=6;this.r=24;this.sc=400;this.vx=(Math.random()<.5?-1:1)*1.5;this.vy=.6;this.st=rndI(40,70);break;
      case 'artillery':  this.hp=4;this.r=20;this.sc=280;this.vx=rnd(-.5,.5);this.vy=.4;this.st=rndI(90,150);break;
      case 'miniboss':   this.hp=28;this.r=32;this.sc=1200;this.vx=1.6;this.vy=.5;this.st=28;break;
    }
    this.maxHp=this.hp;
  }
  update(){
    this.ph++;
    switch(this.type){
      case 'drone':case 'drone_fast':
        this.x+=this.vx;this.y+=this.vy;
        this.vx+=rnd(-.09,.09);this.vx=clamp(this.vx,-4.5,4.5);
        if(this.x<14||this.x>W-14)this.vx*=-1;
        if(this.y>H+50){this.dead=true;return;}
        if(--this.st<=0&&this.y>0&&this.y<H*.6){
          bullets.push(mkB(this.x,this.y+12,0,4,false,1,'plasma'));
          this.st=rndI(60,110);}break;
      case 'tripod':
        this.legPh++;this.x+=this.vx;this.y+=this.vy;
        if(this.x<24||this.x>W-24)this.vx*=-1;
        if(this.y>H+60){this.dead=true;return;}
        if(--this.st<=0&&this.y>-20){
          // Laser beam toward player
          if(player){const dx=player.x-this.x,dy=player.y-this.y,len=Math.hypot(dx,dy);
            for(let i=0;i<3;i++)bullets.push(mkB(this.x,this.y,dx/len*3.2+rnd(-.5,.5),dy/len*3.2+rnd(-.5,.5),false,1,'beam'));}
          tone(100,.2,'sawtooth',.2);this.st=rndI(40,75);}break;
      case 'artillery':
        this.y+=Math.sin(this.ph*.016)*.55+.25;this.x+=this.vx;
        if(this.x<22||this.x>W-22)this.vx*=-1;
        if(this.y>H+50){this.dead=true;return;}
        if(--this.st<=0&&this.y>0&&this.y<H*.65){
          for(let i=0;i<6;i++){const a=i*Math.PI/3;bullets.push(mkB(this.x,this.y,Math.cos(a)*3.4,Math.sin(a)*3.4,false,1,'plasma'));}
          tone(160,.12,'square',.2);this.st=rndI(95,155);}break;
      case 'miniboss':
        this.x+=Math.sin(this.ph*.022)*2.2+this.vx;
        if(this.y<180)this.y+=this.vy;else if(this.y>205)this.y-=.3;
        if(this.x<35||this.x>W-35)this.vx*=-1;
        if(--this.st<=0){
          for(let i=0;i<8;i++){const a=i*Math.PI/4+this.ph*.03;
            bullets.push(mkB(this.x,this.y,Math.cos(a)*4.2,Math.sin(a)*4.2,false,1,'plasma'));}
          sfx.exp();this.st=35;}break;
    }
  }
  hit(dmg){
    this.hp-=dmg;ptcl(this.x,this.y,'#00ff88',5);
    if(this.hp<=0){this.dead=true;addScore(this.sc);bigExp(this.x,this.y);
      if(Math.random()<.14)powerups.push(new PowerUp(this.x,this.y));}
  }
  draw(){
    X.save();
    switch(this.type){
      case 'drone':      drawDrone(this.x,this.y,false);break;
      case 'drone_fast': drawDrone(this.x,this.y,true);break;
      case 'tripod':     drawTripod(this.x,this.y,this.hp,this.maxHp,this.legPh);break;
      case 'artillery':  drawArtillery(this.x,this.y,this.ph);break;
      case 'miniboss':   drawMiniboss(this.x,this.y,this.ph,this.hp,this.maxHp);break;
    }
    X.restore();
  }
}

// ══ BOSS ═══════════════════════════════════════════════════
class Boss{
  constructor(lvl){
    this.lvl=lvl;this.x=W/2;this.y=-150;this.tY=110;
    this.dead=false;this.entering=true;this.ph=0;this.timer=0;
    this.apt=0;this.apn=0;this.phase2=false;
    switch(lvl){case 0:this.hp=100;this.r=65;this.sc=10000;break;case 1:this.hp=150;this.r=70;this.sc=15000;break;case 2:this.hp=200;this.r=72;this.sc=20000;break;}
    this.maxHp=this.hp;
  }
  update(){
    this.timer++;this.ph++;
    if(this.entering){this.y=lerp(this.y,this.tY,.038);if(Math.abs(this.y-this.tY)<5){this.y=this.tY;this.entering=false;}return;}
    this.x=W/2+Math.sin(this.ph*.013)*160;
    this.apt--;if(this.apt<=0){this.attack();this.apt=this.phase2?48:65;this.apn=(this.apn+1)%3;}
    if(this.hp<=this.maxHp*.45&&!this.phase2){this.phase2=true;shk(18);sfx.exp(true);ptcl(this.x,this.y,'#ff4400',40);}
  }
  attack(){
    const s=this.phase2?5.2:3.8;
    if(this.apn===0&&player){// Aimed
      const dx=player.x-this.x,dy=player.y-this.y,l=Math.hypot(dx,dy);
      bullets.push(mkB(this.x,this.y+38,dx/l*s,dy/l*s,false,1,'plasma'));
      if(this.phase2){bullets.push(mkB(this.x-14,this.y+38,dx/l*s+.8,dy/l*s,false,1,'plasma'));bullets.push(mkB(this.x+14,this.y+38,dx/l*s-.8,dy/l*s,false,1,'plasma'));}
    }else if(this.apn===1){// Radial
      const n=this.phase2?18:10;
      for(let i=0;i<n;i++){const a=i/n*Math.PI*2+this.timer*.04;bullets.push(mkB(this.x,this.y,Math.cos(a)*s,Math.sin(a)*s,false,1,'plasma'));}
      tone(130,.2,'square',.3);
    }else{// Column barrage
      for(let i=-3;i<=3;i++){bullets.push(mkB(this.x+i*24,this.y+30,0,s,false,1,'beam'));}
      if(this.phase2){for(let i=-2;i<=2;i++){bullets.push(mkB(this.x+i*24,this.y+30,.7,s,false,1,'beam'));bullets.push(mkB(this.x+i*24,this.y+30,-.7,s,false,1,'beam'));}}
      tone(180,.15,'sawtooth',.25);
    }
  }
  hit(dmg){
    this.hp-=dmg;ptcl(this.x,this.y,'#00ffcc',7);shk(3);
    if(this.hp<=0){
      this.dead=true;addScore(this.sc);bigExp(this.x,this.y);
      for(let i=0;i<8;i++)setTimeout(()=>bigExp(this.x+rnd(-80,80),this.y+rnd(-70,70)),i*140);
      bombs=Math.min(9,bombs+1);
    }
  }
  draw(){
    switch(this.lvl){
      case 0:drawBossMotherShip(this.x,this.y,this.timer,this.phase2);break;
      case 1:drawBossRobot(this.x,this.y,this.timer,this.phase2);break;
      case 2:drawBossBattleship(this.x,this.y,this.timer,this.phase2);break;
    }
    // Boss HP bar - cinematic style
    X.fillStyle='rgba(0,0,0,.75)';X.fillRect(38,46,W-76,16);
    const pct=this.hp/this.maxHp;
    const bpG=X.createLinearGradient(38,0,38+(W-76)*pct,0);
    if(this.phase2){bpG.addColorStop(0,'#440000');bpG.addColorStop(.5,'#cc1100');bpG.addColorStop(1,'#ff4400');}
    else{bpG.addColorStop(0,'#003322');bpG.addColorStop(.5,'#007744');bpG.addColorStop(1,'#00cc66');}
    X.fillStyle=bpG;X.fillRect(39,47,(W-78)*pct,14);
    // Phase indicator flash
    if(this.phase2&&Math.sin(frame*.2)>.4){
      X.fillStyle='rgba(255,0,0,.08)';X.fillRect(39,47,(W-78)*pct,14);}
    X.strokeStyle=this.phase2?'#ff4400':'#00cc66';X.lineWidth=1.5;X.strokeRect(38,46,W-76,16);
    corners(38,46,W-76,16,8,this.phase2?'#ff4400':'#00cc66');
    goldText(BOSSES[this.lvl],W/2,59,9);
    if(this.phase2){glow('#ff0000',8);X.fillStyle='#ff2222';X.font='bold 8px "Share Tech Mono"';X.textAlign='right';X.fillText('PHASE 2',W-44,59);noGlow();}
  }
}

// ══ PARTICLES ══════════════════════════════════════════════
function ptcl(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2),s=rnd(2.5,8);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color,life:rnd(20,48),maxLife:48,sz:rnd(1.5,4),dead:false});
  }
}
function bigExp(x,y){ptcl(x,y,'#ff6600',28);ptcl(x,y,'#ffcc00',18);ptcl(x,y,'#ff2200',14);ptcl(x,y,'#ffffff',8);shk(12);sfx.exp(true);}
function updPtcl(){
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.vx*=.96;p.life--;if(p.life<=0)p.dead=true;});
  particles=particles.filter(p=>!p.dead);
  if(particles.length>400)particles.splice(0,80);
}
function drawPtcl(){
  particles.forEach(p=>{
    X.globalAlpha=p.life/p.maxLife;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.sz*(p.life/p.maxLife),0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;
}

// ══ POWER-UPS ══════════════════════════════════════════════
class PowerUp{
  constructor(x,y){this.x=x;this.y=y;this.vy=1.4;this.dead=false;this.life=460;this.ph=0;
    this.type=['weapon','shield','bomb'][rndI(0,2)];}
  update(){
    this.y+=this.vy;this.ph++;this.life--;
    if(this.y>H+20||this.life<=0){this.dead=true;return;}
    if(player&&dist(this,player)<24){this.collect();}
  }
  collect(){
    this.dead=true;sfx.powerup();
    if(this.type==='weapon')player.wl=Math.min(2,player.wl+1);
    else if(this.type==='shield')player.shield=350;
    else{bombs=Math.min(9,bombs+1);}
  }
  draw(){
    X.save();X.translate(this.x,this.y);X.rotate(this.ph*.05);
    const cols={weapon:'#ffaa00',shield:'#00aaff',bomb:'#ff4400'};
    const lbls={weapon:'W',shield:'S',bomb:'B'};
    const c=cols[this.type];
    glow(c,16);
    // Pentagon
    X.fillStyle=`rgba(${this.type==='bomb'?'100,20,0':this.type==='shield'?'0,40,100':'60,40,0'},.8)`;
    X.beginPath();for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;X.lineTo(Math.cos(a)*15,Math.sin(a)*15);}
    X.closePath();X.fill();
    X.strokeStyle=c;X.lineWidth=2;X.stroke();
    noGlow();X.fillStyle='#fff';X.font='bold 12px "Share Tech Mono"';
    X.textAlign='center';X.textBaseline='middle';X.fillText(lbls[this.type],0,0);
    X.textBaseline='alphabetic';X.restore();
  }
}

function drawHPBar(x,y,w,hp,maxHp){

function execSpawn(ev){
  if(ev.tp==='boss'){bossActive=true;enemies.forEach(e=>e.dead=true);boss=new Boss(level);bossWarning=120;sfx.warning();return;}
  const tmap={vee:'drone',line:'drone',swarm:'drone',tpd:'tripod',art:'artillery',mini:'miniboss'};
  const t=tmap[ev.tp];
  for(let i=0;i<ev.n;i++){
    setTimeout(()=>{
      if(STATE!=='playing')return;
      let x,y=-40;
      if(ev.tp==='vee'){x=W/2+(i-ev.n/2)*40;y=-30-Math.abs(i-ev.n/2)*20;}
      else if(ev.tp==='line'){x=W/(ev.n+1)*(i+1);}
      else{x=rnd(20,W-20);}
      const tp=ev.tp==='swarm'&&Math.random()<.35?'drone_fast':t;
      enemies.push(new Enemy(x,y,tp));
    },i*(ev.tp==='swarm'?32:ev.tp==='mini'?400:85));
  }
}

  const a=Math.min(1,bossWarning>90?(120-bossWarning)/30:bossWarning/30);
  const flash=Math.sin(frame*.25)>.2;
  X.fillStyle=`rgba(80,0,0,${a*.55})`;X.fillRect(0,0,W,H);
  if(flash){
    glow('#ff0000',30);
    metalRect(20,H*.38,W-40,74,'#220000','#440000','#cc0000');
    corners(20,H*.38,W-40,74,10,'#ff0000');
    X.fillStyle='#ff0000';X.font=`bold 38px 'Share Tech Mono'`;X.textAlign='center';
    X.fillText('WARNING!',W/2,H*.38+52);noGlow();
    X.fillStyle='rgba(255,180,60,.8)';X.font=`10px 'Share Tech Mono'`;
    X.fillText(BOSSES[level]+' APPROACHING',W/2,H*.38+68);
  }
  if(bossWarning<=0&&boss){bossWarning=0;STATE='playing';}
}

function drawLevelBanner(){
  if(levelT>160)return;
  const a=levelT<55?levelT/55:Math.max(0,(160-levelT)/55);
  X.save();X.globalAlpha=a;
  X.fillStyle='rgba(0,0,0,.55)';X.fillRect(0,H*.38,W,90);
  metalRect(20,H*.41,W-40,60,'#0a0c08','#141e10','rgba(100,160,60,.5)');
  corners(20,H*.41,W-40,60,8,'rgba(100,160,60,.7)');
  goldText(`LEVEL ${level+1}`,W/2,H*.41+24,11);
  X.fillStyle='rgba(255,255,255,.9)';X.font=`bold 16px 'Share Tech Mono'`;X.textAlign='center';
  X.fillText(LEVELS[level].name,W/2,H*.41+48);
  X.restore();
}

function drawLevelClear(){
  const a=Math.min(1,levelClearT/50);
  X.fillStyle=`rgba(0,0,0,${a*.7})`;X.fillRect(0,0,W,H);
  if(levelClearT>45){
    glow('#00ff88',18);
    metalRect(20,H*.35,W-40,80,'#021408','#042e14','#00cc55');
    corners(20,H*.35,W-40,80,10,'#00ff88');
    X.fillStyle='#00ff88';X.font=`bold 18px 'Share Tech Mono'`;X.textAlign='center';
    X.fillText('ZONA LIBERADA',W/2,H*.35+38);noGlow();
    X.fillStyle='rgba(200,255,200,.7)';X.font=`11px 'Share Tech Mono'`;
    X.fillText(level<2?`AVANZANDO A NIVEL ${level+2}...`:'INVASIÓN REPELIDA!',W/2,H*.35+62);
  }
}

const LEVELS=[
  {name:'RAMBLA SUR',bossName:'NODRIZA ALIENÍGENA'},
  {name:'CENTRO · PALACIO SALVO',bossName:'ROBOT DESTRUCTOR'},
  {name:'PUERTO · CIUDAD VIEJA',bossName:'ACORAZADO ALIEN'},
];

function drawMissionComplete(){
  X.fillStyle='rgba(0,0,0,.88)';X.fillRect(0,0,W,H);
  // Title plate
  metalRect(10,40,W-20,46,'#0a1008','#162014','#00cc55');
  corners(10,40,W-20,46,12,'#00ff88');
  const mg=X.createLinearGradient(10,40,W-10,86);
  mg.addColorStop(0,'#00aa44');mg.addColorStop(.5,'#00ff88');mg.addColorStop(1,'#00aa44');
  glow('#00ff88',18);X.strokeStyle=mg;X.lineWidth=2;X.strokeRect(11,41,W-22,44);noGlow();
  X.fillStyle='#00ff88';X.font=`bold 20px 'Share Tech Mono'`;X.textAlign='center';X.fillText('MISSION COMPLETE',W/2,73);

  // Score breakdown
  const rows=[
    ['TOTAL SCORE',fmt(missionScore),'#ffcc44'],
    ['TIME BONUS',fmt(bonusScore),'#44aaff'],
    ['ENEMIES DEFEATED',fmt(score-missionScore-bonusScore),'#88ff66'],
    ['',null],
    ['FINAL SCORE',fmt(score),'#ffee44'],
  ];
  rows.forEach((r,i)=>{
    if(!r[1]){// Divider
      X.strokeStyle='rgba(120,90,30,.4)';X.lineWidth=1;X.beginPath();X.moveTo(20,H*.36+i*44+22);X.lineTo(W-20,H*.36+i*44+22);X.stroke();return;
    }
    metalRect(20,H*.36+i*44-2,W-40,36,i===4?'#0a0c00':'#08100a',i===4?'#1e1e00':'#0e180a',i===4?'#aa9900':'rgba(80,100,40,.4)');
    X.fillStyle='rgba(200,160,80,.6)';X.font=`${i===4?'bold ':''}${i===4?12:10}px 'Share Tech Mono'`;X.textAlign='left';
    X.fillText(r[0],32,H*.36+i*44+18);
    glow(r[2],i===4?10:5);X.fillStyle=r[2];X.font=`bold ${i===4?16:13}px 'Share Tech Mono'`;X.textAlign='right';
    X.fillText(r[1],W-32,H*.36+i*44+22);noGlow();
  });
  // Hi-score
  if(score>=hiScore){glow('#ffff00',10);X.fillStyle='#ffff44';X.font=`bold 12px 'Share Tech Mono'`;X.textAlign='center';X.fillText('★ NEW HI-SCORE! ★',W/2,H*.84);noGlow();}
  // Continue
  metalRect(20,H-70,W-40,44,'#0a0806','#1e1610','#7a6030');
  corners(20,H-70,W-40,44,8,'#7a6030');
  if(Math.sin(frame*.05)>0){
    X.fillStyle='rgba(255,200,80,.8)';X.font=`bold 11px 'Share Tech Mono'`;X.textAlign='center';
    X.fillText('PRESS START TO CONTINUE',W/2,H-42);}
}

function drawGameOver(){
  X.fillStyle='rgba(0,0,0,.78)';X.fillRect(0,0,W,H);
  metalRect(20,H*.3,W-40,100,'#150000','#2a0000','#880000');
  corners(20,H*.3,W-40,100,10,'#ff2200');
  glow('#ff0000',22);X.fillStyle='#ee1100';X.font=`bold 38px 'Share Tech Mono'`;X.textAlign='center';
  X.fillText('MISSION',W/2,H*.3+50);X.fillText('FAILED',W/2,H*.3+88);noGlow();
  metalRect(60,H*.62,W-120,38,'#0a0c08','#141610','rgba(120,90,30,.5)');
  X.fillStyle='rgba(255,200,80,.8)';X.font=`13px 'Share Tech Mono'`;X.textAlign='center';
  X.fillText(`SCORE: ${fmt(score)}`,W/2,H*.62+24);
  X.fillStyle='rgba(200,160,80,.5)';X.font=`9px 'Share Tech Mono'`;
  X.fillText('TOCÁ PARA REINTENTAR',W/2,H*.82);
}

// ══ GAME INIT & LOOP ══════════════════════════════════════
function initLevel(){
  enemies=[];bullets=[];particles=[];powerups=[];
  boss=null;bossActive=false;bossWarning=0;
  levelT=0;levelClearT=0;bgY=0;
  spawnQ=mkSpawns(Math.min(level,2));
  if(player){player.wl=Math.max(0,player.wl-1);player.hp=Math.min(player.maxHp,player.hp+1);player.x=W/2;player.y=H-120;player.special=100;player.inv=90;}
}
function initGame(){
  level=0;score=0;combo=0;bombs=2;
  player=new Player(selPlane);initLevel();STATE='playing';sfx.start();
}

function updateGame(){
  levelT++;bgY+=1.4;
  if(comboT>0)comboT--;else combo=0;
  if(player&&!player.dead)player.update();
  updBullets();
  enemies.forEach(e=>{if(!e.dead)e.update();});enemies=enemies.filter(e=>!e.dead);
  if(boss&&!boss.dead)boss.update();
  if(boss&&boss.dead){
    missionScore=score;bonusScore=Math.max(0,Math.floor((2000-levelT)*10));
    score+=bonusScore;if(score>hiScore)hiScore=score;
    boss=null;bossActive=false;
    if(level>=2){STATE='missioncomplete';}
    else{level++;initLevel();STATE='playing';}
  }
  updPtcl();powerups.forEach(p=>p.update());powerups=powerups.filter(p=>!p.dead);
  processSpawns();
  if(bossWarning>0){bossWarning--;if(bossWarning===0&&boss)STATE='playing';}
  if(bullets.length>550)bullets.splice(0,100);
}

function loop(){
  requestAnimationFrame(loop);frame++;
  let sx=0,sy=0;
  if(shake>.3){sx=rnd(-shake,shake);sy=rnd(-shake,shake);shake*=.82;}else shake=0;
  X.save();X.translate(sx,sy);

  switch(STATE){
    case 'title':
      drawTitle();
      if(anyKey){anyKey=false;Object.keys(K).forEach(k=>K[k]=false);sfx.select();STATE='select';}break;
    case 'select':
      drawSelect();
      if(K['ArrowLeft']||K['KeyA']){selPlane=0;K['ArrowLeft']=K['KeyA']=false;sfx.select();}
      if(K['ArrowRight']||K['KeyD']){selPlane=1;K['ArrowRight']=K['KeyD']=false;sfx.select();}
      if(K['Space']||K['Enter']){K['Space']=K['Enter']=false;initGame();}
      if(K['Escape']){K['Escape']=false;STATE='title';}break;
    case 'playing':
      updateGame();
      drawBG();drawPtcl();powerups.forEach(p=>p.draw());drawBullets();
      enemies.forEach(e=>{if(!e.dead)e.draw();});
      if(boss&&!boss.dead)boss.draw();
      if(player&&!player.dead)player.draw();
      drawHUD();drawTouchJoystick();drawLevelBanner();
      if(bossWarning>0)drawWarning();break;
    case 'gameover':
      drawBG();drawPtcl();drawBullets();drawHUD();drawGameOver();
      if(K['Space']){K['Space']=false;initGame();}
      if(K['Escape']){K['Escape']=false;STATE='title';Object.keys(K).forEach(k=>K[k]=false);}break;
    case 'missioncomplete':
      drawBG();drawMissionComplete();
      if(K['Space']||K['Enter']||anyKey){anyKey=false;K['Space']=K['Enter']=false;STATE='title';Object.keys(K).forEach(k=>K[k]=false);}break;
  }
  X.restore();
}

requestAnimationFrame(loop);
</script>
