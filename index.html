<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Ataque De Pánico</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;
     min-height:100vh;overflow:hidden}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<video id="titlevid" loop muted playsinline preload="auto"
  style="display:none;position:absolute;pointer-events:none"></video>
<canvas id="c"></canvas>
<script>
// ─── CANVAS ───────────────────────────────────────────────
const C=document.getElementById('c'),X=C.getContext('2d');
const TITLEVID=document.getElementById('titlevid');
var titleVidReady=false;
TITLEVID.addEventListener('canplaythrough',function(){titleVidReady=true;});
TITLEVID.addEventListener('playing',function(){titleVidReady=true;});
// Use fetch+blob to bypass browser URL safety checks
fetch('title_bg.mp4')
  .then(function(r){return r.blob();})
  .then(function(blob){
    var url=URL.createObjectURL(blob);
    TITLEVID.src=url;
    TITLEVID.load();
    TITLEVID.play().catch(function(){/* needs user gesture */});
  })
  .catch(function(e){console.log('Video fetch failed:',e);});
const W=480,H=720;C.width=W;C.height=H;
(function resize(){const s=Math.min(innerWidth/W,innerHeight/H);
  C.style.width=W*s+'px';C.style.height=H*s+'px';})();
addEventListener('resize',()=>{const s=Math.min(innerWidth/W,innerHeight/H);
  C.style.width=W*s+'px';C.style.height=H*s+'px';});

// ─── AUDIO ────────────────────────────────────────────────
let AC;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,d,tp='square',v=.18,sw=1){
  if(!AC)return;
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type=tp;
  o.frequency.setValueAtTime(f,AC.currentTime);
  if(sw!==1)o.frequency.exponentialRampToValueAtTime(f*sw,AC.currentTime+d);
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.start();o.stop(AC.currentTime+d);}catch(e){}}
const sfx={
  shoot:()=>tone(1100,.05,'square',.07),
  rocket:()=>tone(350,.15,'sawtooth',.15,.35),
  exp:(b)=>{tone(b?60:120,b?.7:.3,'sawtooth',b?.4:.25,.1);},
  pu:()=>{tone(440,.08,'sine',.25);setTimeout(()=>tone(660,.08,'sine',.25),100);setTimeout(()=>tone(880,.12,'sine',.25),200);},
  hit:()=>tone(180,.08,'sawtooth',.12,.7),
  sel:()=>tone(660,.07,'sine',.2),
  warn:()=>{tone(280,.22,'square',.38,.5);setTimeout(()=>tone(280,.22,'square',.38,.5),330);},
};

// ─── INPUT ────────────────────────────────────────────────
const K={};
let anyKey=false,frame=0;
// Touch joystick
let tId=null,t2Id=null,tSX=0,tSY=0,tDX=0,tDY=0,tActive=false,tSpec=false,tSpecFired=false;
let tapX=0,tapY=0,tapPending=false;

addEventListener('keydown',e=>{K[e.code]=true;initAC();anyKey=true;});
addEventListener('keyup',e=>{K[e.code]=false;});

C.addEventListener('touchstart',e=>{
  e.preventDefault();initAC();anyKey=true;
  const r=C.getBoundingClientRect(),sc=W/r.width;
  for(const t of e.changedTouches){
    if(tId===null){
      tId=t.identifier;tSX=t.clientX;tSY=t.clientY;tDX=0;tDY=0;tActive=true;
      tapX=(t.clientX-r.left)*sc;tapY=(t.clientY-r.top)*sc;tapPending=true;
    }else if(t2Id===null){t2Id=t.identifier;tSpec=true;tSpecFired=false;}
  }
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===tId){tDX=t.clientX-tSX;tDY=t.clientY-tSY;}
  }
},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===tId){
      if(tapPending&&Math.hypot(tDX,tDY)<18)handleTap(tapX,tapY);
      tId=null;tDX=0;tDY=0;tActive=false;tapPending=false;
    }
    if(t.identifier===t2Id){t2Id=null;tSpec=false;}
  }
},{passive:false});

function handleTap(tx,ty){
  if(G.state==='title'){anyKey=true;}
  else if(G.state==='select'){
    const ns=tx<W/2?0:1;
    if(ns===G.sel)startGame();else{G.sel=ns;sfx.sel();}
  }
  else if(G.state==='over'){startGame();}
  else if(G.state==='win'){G.state='title';}
}

// ─── UTILS ────────────────────────────────────────────────
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndI=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const ph=(n)=>((Math.sin(n*127.1)*43758.5453)%1+1)%1;
const ph2=(x,y)=>((Math.sin(x*127.1+y*311.7)*43758.5453)%1+1)%1;
const fmt=(n,z=6)=>String(Math.floor(n)).padStart(z,'0');
function glow(c,b=10){X.shadowBlur=b;X.shadowColor=c;}
function noGlow(){X.shadowBlur=0;}
function darken(h,a){
  if(!h||h[0]!=='#')return '#888';
  var r=Math.max(0,parseInt(h.slice(1,3),16)-a);
  var g=Math.max(0,parseInt(h.slice(3,5),16)-a);
  var b=Math.max(0,parseInt(h.slice(5,7),16)-a);
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);
}

let shakeAmt=0;
function shk(a){shakeAmt=Math.max(shakeAmt,a);}

// ─── GAME STATE ───────────────────────────────────────────
const G={state:'title',sel:0,level:0,score:0,hi:0,bombs:2,combo:0,comboT:0,bgY:0,lvlT:0,bossOn:false,bossWarn:0};
let player=null,bullets=[],enemies=[],particles=[],pups=[],boss=null,spawnQ=[];

function addScore(pts){
  const m=G.combo>5?3:G.combo>2?2:1;
  G.score+=pts*m;G.combo++;G.comboT=120;
  if(G.score>G.hi)G.hi=G.score;
}

// ─── IMAGE BACKGROUNDS ────────────────────────────────────
var bgImgs=[null,null,null];
var bgLoaded=[false,false,false];
(function preload(){
  for(var i=0;i<3;i++){
    (function(idx){
      var im=new Image();
      im.onload=function(){bgImgs[idx]=im;bgLoaded[idx]=true;};
      im.onerror=function(){bgLoaded[idx]=true;}; // fallback ok
      im.src='img/level'+idx+'.png';
    })(i);
  }
})();

// Fallback color per level if image not loaded
var BG_FALLBACK=['#d0c098','#c8b890','#b8a878'];

// ─── SPRITE IMAGES ────────────────────────────────────────
var SPR={};
var SPR_LOADED={};
['drone','drone_fast','tripod','artillery','artillery_sp',
 'miniboss','boss_nodriza','boss_robot','boss_acorazado'].forEach(function(n){
  var im=new Image();
  im.onload=function(){SPR[n]=im;SPR_LOADED[n]=true;};
  im.onerror=function(){SPR_LOADED[n]=false;};
  im.src='img/sprites/'+n+'.png';
});
function drawSprite(name,x,y,w,h,angle){
  var im=SPR[name];
  if(!im||!SPR_LOADED[name])return false;
  X.save();X.translate(x,y);
  if(angle)X.rotate(angle);
  X.drawImage(im,-w/2,-h/2,w,h);
  X.restore();
  return true;
}

function drawBG(){
  var lvl=G.level;
  var im=bgImgs[lvl];

  if(im&&bgLoaded[lvl]){
    // Image is 341x1536 → scale to fill W=480 wide
    var scale=W/im.width;           // 480/341 ≈ 1.407
    var dw=W;
    var dh=im.height*scale;         // 1536*1.407 ≈ 2160px tall

    // Scroll: bgY increases. We tile the image vertically.
    var offset=(G.bgY*0.9)%dh;     // scroll upward

    // Draw two copies tiled — image scrolls bottom-to-top
    X.drawImage(im, 0, offset-dh,  dw, dh);
    X.drawImage(im, 0, offset,     dw, dh);
    X.drawImage(im, 0, offset+dh,  dw, dh);
  } else {
    // Fallback while loading
    X.fillStyle=BG_FALLBACK[lvl];
    X.fillRect(0,0,W,H);
    // Simple grid hint
    X.strokeStyle='rgba(0,0,0,.12)';X.lineWidth=1;
    for(var i=0;i<10;i++){X.beginPath();X.moveTo(i*(W/10),0);X.lineTo(i*(W/10),H);X.stroke();}
    for(var i=0;i<14;i++){X.beginPath();X.moveTo(0,i*(H/14));X.lineTo(W,i*(H/14));X.stroke();}
  }
}

// ─── AIRCRAFT ─────────────────────────────────────────────
function drawA29(x,y,sc=1){
  X.save();X.translate(x,y);X.scale(sc,sc);
  // Exhaust
  glow('#ff8800',18);X.fillStyle='rgba(255,130,40,.6)';X.beginPath();X.ellipse(0,24,4,7,0,0,Math.PI*2);X.fill();noGlow();
  // Horizontal stabs
  X.fillStyle='#3a5a1e';
  X.beginPath();X.moveTo(-3,18);X.lineTo(-15,23);X.lineTo(-12,27);X.lineTo(-2,21);X.closePath();X.fill();
  X.beginPath();X.moveTo(3,18);X.lineTo(15,23);X.lineTo(12,27);X.lineTo(2,21);X.closePath();X.fill();
  // Wings
  const wg=X.createLinearGradient(-6,2,-37,10);wg.addColorStop(0,'#4a7230');wg.addColorStop(1,'#304e1a');
  X.fillStyle=wg;
  X.beginPath();X.moveTo(-6,-2);X.lineTo(-6,10);X.lineTo(-37,13);X.lineTo(-37,6);X.closePath();X.fill();
  X.fillStyle=X.createLinearGradient(6,2,37,10);
  const wgR=X.createLinearGradient(6,2,37,10);wgR.addColorStop(0,'#4a7230');wgR.addColorStop(1,'#304e1a');
  X.fillStyle=wgR;
  X.beginPath();X.moveTo(6,-2);X.lineTo(6,10);X.lineTo(37,13);X.lineTo(37,6);X.closePath();X.fill();
  X.strokeStyle='rgba(130,200,80,.3)';X.lineWidth=1;
  X.beginPath();X.moveTo(-6,-2);X.lineTo(-37,6);X.stroke();
  X.beginPath();X.moveTo(6,-2);X.lineTo(37,6);X.stroke();
  // Hardpoints
  for(const s of[-28,28]){X.fillStyle='#d0c8a8';X.beginPath();X.ellipse(s,7,1.8,7,0,0,Math.PI*2);X.fill();X.fillStyle='#ee3300';X.beginPath();X.arc(s,1,2,0,Math.PI*2);X.fill();}
  for(const s of[-18,18]){X.fillStyle='#5a5838';X.beginPath();X.ellipse(s,7,3,8,0,0,Math.PI*2);X.fill();}
  // Fuselage
  const fg=X.createLinearGradient(-7,-28,7,0);fg.addColorStop(0,'#5e7840');fg.addColorStop(.5,'#4e6632');fg.addColorStop(1,'#364822');
  X.fillStyle=fg;
  X.beginPath();X.moveTo(0,-30);X.bezierCurveTo(5,-22,6,-8,5,2);X.lineTo(5,21);X.lineTo(-5,21);X.bezierCurveTo(-6,-8,-5,-22,0,-30);X.closePath();X.fill();
  X.strokeStyle='rgba(0,0,0,.25)';X.lineWidth=1.2;X.beginPath();X.moveTo(0,-28);X.lineTo(0,21);X.stroke();
  // Camo
  X.fillStyle='rgba(40,60,18,.4)';X.beginPath();X.ellipse(1,-6,3,8,.15,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(-1,8,2,5,-.1,0,Math.PI*2);X.fill();
  // Engine cowl
  X.fillStyle='#6a8848';X.beginPath();X.ellipse(0,-17,6,8,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(0,0,0,.5)';X.beginPath();X.ellipse(-3,-14,1.5,3,-.3,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(3,-14,1.5,3,.3,0,Math.PI*2);X.fill();
  // Prop disc
  X.strokeStyle='rgba(180,180,160,.3)';X.lineWidth=2;X.beginPath();X.arc(0,-29,5,0,Math.PI*2);X.stroke();
  X.strokeStyle='rgba(180,180,160,.5)';X.lineWidth=1;
  X.beginPath();X.moveTo(-5,-29);X.lineTo(5,-29);X.stroke();
  X.beginPath();X.moveTo(0,-34);X.lineTo(0,-24);X.stroke();
  // Cockpit
  const cg=X.createRadialGradient(-.5,-10,0,0,-9,5);
  cg.addColorStop(0,'rgba(180,230,255,.95)');cg.addColorStop(.5,'rgba(80,150,210,.8)');cg.addColorStop(1,'rgba(30,80,160,.6)');
  X.fillStyle=cg;X.beginPath();X.ellipse(0,-10,3.5,5,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,255,.4)';X.beginPath();X.ellipse(-1,-12,1.5,2.5,-.3,0,Math.PI*2);X.fill();
  X.fillStyle='#1e1e12';X.beginPath();X.ellipse(0,23,3,5,0,0,Math.PI*2);X.fill();
  glow('#ff6600',8);X.fillStyle='rgba(255,100,30,.7)';X.beginPath();X.ellipse(0,24,1.5,3,0,0,Math.PI*2);X.fill();noGlow();
  X.restore();
}

function drawA37(x,y,sc=1){
  X.save();X.translate(x,y);X.scale(sc,sc);
  glow('#ff9900',16);X.fillStyle='#ff6600';
  X.beginPath();X.ellipse(-5,25,3.5,6,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(5,25,3.5,6,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,150,60,.3)';
  X.beginPath();X.ellipse(-5,31,2,5,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(5,31,2,5,0,0,Math.PI*2);X.fill();noGlow();
  // Stabs
  X.fillStyle='#484818';
  X.beginPath();X.moveTo(-6,17);X.lineTo(-21,22);X.lineTo(-20,27);X.lineTo(-5,21);X.closePath();X.fill();
  X.beginPath();X.moveTo(6,17);X.lineTo(21,22);X.lineTo(20,27);X.lineTo(5,21);X.closePath();X.fill();
  // Wings (straight — signature A-37)
  const wgL=X.createLinearGradient(-7,-4,-42,8);wgL.addColorStop(0,'#5a5a22');wgL.addColorStop(1,'#404010');
  X.fillStyle=wgL;X.beginPath();X.moveTo(-7,-4);X.lineTo(-7,12);X.lineTo(-42,12);X.lineTo(-42,-2);X.closePath();X.fill();
  const wgR=X.createLinearGradient(7,-4,42,8);wgR.addColorStop(0,'#5a5a22');wgR.addColorStop(1,'#404010');
  X.fillStyle=wgR;X.beginPath();X.moveTo(7,-4);X.lineTo(7,12);X.lineTo(42,12);X.lineTo(42,-2);X.closePath();X.fill();
  X.strokeStyle='rgba(0,0,0,.28)';X.lineWidth=.7;
  for(const[s,e]of[[-7,-42],[7,42]]){X.beginPath();X.moveTo(s,4);X.lineTo(e,4);X.stroke();}
  // Tip tanks (very distinctive)
  for(const tx of[-42,42]){
    X.fillStyle='#484820';X.beginPath();X.ellipse(tx,5,4,10,0,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(255,220,80,.25)';X.lineWidth=.8;X.stroke();
  }
  // 6 hardpoints
  for(const s of[-32,32]){X.fillStyle='#485228';X.beginPath();X.ellipse(s,5,2.5,7,0,0,Math.PI*2);X.fill();X.fillStyle='rgba(255,80,0,.6)';X.beginPath();X.arc(s,-1,2,0,Math.PI*2);X.fill();}
  for(const s of[-22,22]){X.fillStyle='#303010';X.beginPath();X.ellipse(s,5,3.5,8,0,0,Math.PI*2);X.fill();}
  for(const s of[-13,13]){X.fillStyle='#3a3012';X.beginPath();X.ellipse(s,6,2.5,9,0,0,Math.PI*2);X.fill();}
  // Fuselage
  const fg=X.createLinearGradient(-9,-24,9,0);fg.addColorStop(0,'#6a6a2a');fg.addColorStop(.5,'#585820');fg.addColorStop(1,'#484812');
  X.fillStyle=fg;
  X.beginPath();X.moveTo(0,-28);X.bezierCurveTo(8,-20,9,-8,9,4);X.lineTo(8,23);X.lineTo(-8,23);X.bezierCurveTo(-9,-8,-8,-20,0,-28);X.closePath();X.fill();
  X.strokeStyle='rgba(0,0,0,.3)';X.lineWidth=1.2;X.beginPath();X.moveTo(0,-26);X.lineTo(0,23);X.stroke();
  // Camo
  X.fillStyle='rgba(30,40,10,.38)';X.beginPath();X.ellipse(-2,-8,4,6,.2,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(3,6,3,5,-.15,0,Math.PI*2);X.fill();
  // Intakes
  X.fillStyle='rgba(0,0,0,.55)';X.beginPath();X.ellipse(-5,-8,3,6,-.1,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(5,-8,3,6,.1,0,Math.PI*2);X.fill();
  // Cockpit
  const cg=X.createRadialGradient(-.5,-16,0,0,-15,6);
  cg.addColorStop(0,'rgba(180,230,255,.95)');cg.addColorStop(.5,'rgba(80,150,210,.8)');cg.addColorStop(1,'rgba(30,80,160,.55)');
  X.fillStyle=cg;X.beginPath();X.ellipse(0,-16,4.5,6,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,255,.4)';X.beginPath();X.ellipse(-1.5,-18,2,3,-.3,0,Math.PI*2);X.fill();
  X.strokeStyle='rgba(60,80,28,.8)';X.lineWidth=.9;X.beginPath();X.ellipse(0,-16,4.5,6,0,0,Math.PI*2);X.stroke();
  // Nose
  X.fillStyle='#6a6a28';X.beginPath();X.ellipse(0,-26,4,5,0,0,Math.PI*2);X.fill();
  X.strokeStyle='#8a8868';X.lineWidth=1;X.beginPath();X.moveTo(1,-28);X.lineTo(1,-34);X.stroke();
  X.restore();
}

// ─── ENEMIES ──────────────────────────────────────────────
function drawDrone(x,y,fast){
  var name=fast?'drone_fast':'drone';
  var sz=fast?44:50;
  if(!drawSprite(name,x,y,sz,sz)){
    // fallback canvas
    X.save();X.translate(x,y);
    const c=fast?'#55ff77':'#33ee66';glow(c,12);
    X.fillStyle='#0e2818';X.beginPath();X.ellipse(0,0,18,10,0,0,Math.PI*2);X.fill();
    X.strokeStyle=c;X.lineWidth=1.5;X.stroke();
    X.fillStyle='#ff2244';X.beginPath();X.arc(0,0,3,0,Math.PI*2);X.fill();
    noGlow();X.restore();
  }
}

function drawTripod(x,y,hp,mhp,ph2v){
  var sz=72;
  if(!drawSprite('tripod',x,y,sz,sz)){
    // fallback
    X.save();X.translate(x,y);
    const lc=hp<mhp*.4?'#ff3300':'#00ff88';glow(lc,14);
    X.fillStyle='#0e2a1a';X.beginPath();X.ellipse(0,-4,20,22,0,0,Math.PI*2);X.fill();
    X.strokeStyle=lc;X.lineWidth=2;X.stroke();
    X.fillStyle=lc;X.beginPath();X.arc(0,-4,7,0,Math.PI*2);X.fill();
    noGlow();X.restore();
  }
  // HP bar always shown
  hpBar(x-22,y+26,44,hp,mhp);
}

function drawArtillery(x,y,ph3){
  if(!drawSprite('artillery',x,y,60,60)){
    // fallback
    X.save();X.translate(x,y);glow('#44ff88',8);
    X.fillStyle='#0a2010';X.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3+Math.PI/6;X.lineTo(Math.cos(a)*20,Math.sin(a)*20);}
    X.closePath();X.fill();X.strokeStyle='#00dd66';X.lineWidth=2;X.stroke();
    noGlow();X.restore();
  }
}

function drawMiniboss(x,y,ph3,hp,mhp){
  var sz=80;
  if(!drawSprite('miniboss',x,y,sz,sz)){
    // fallback
    X.save();X.translate(x,y);glow('#00ffcc',16);
    X.fillStyle='#0a2018';X.beginPath();X.arc(0,0,28,0,Math.PI*2);X.fill();
    X.strokeStyle='#00ffcc';X.lineWidth=2;X.stroke();
    noGlow();X.restore();
  }
  hpBar(x-25,y+sz*.5+2,50,hp,mhp);
}

// ─── BOSS DRAWINGS ────────────────────────────────────────
function drawBoss(lvl,x,y,t,ph3){
  if(lvl===0)bossShip(x,y,t,ph3);
  else if(lvl===1)bossRobot(x,y,t,ph3);
  else bossBattleship(x,y,t,ph3);
}

function bossShip(x,y,t,p2){
  var sz=p2?150:140;
  // Glow effect behind sprite
  X.save();
  glow(p2?'#ff4400':'#00ff88',28);
  X.fillStyle=p2?'rgba(255,80,0,.15)':'rgba(0,255,100,.12)';
  X.beginPath();X.arc(x,y,sz*.55,0,Math.PI*2);X.fill();
  noGlow();X.restore();
  drawSprite('boss_nodriza',x,y,sz,sz);

// ─── PARTICLES ────────────────────────────────────────────
function ptcl(x,y,c,n=8){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(2.5,8);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,c,life:rnd(20,48),ml:48,sz:rnd(1.5,4)});}}
function bigExp(x,y){ptcl(x,y,'#ff6600',26);ptcl(x,y,'#ffcc00',16);ptcl(x,y,'#ff2200',12);ptcl(x,y,'#fff',8);shk(12);sfx.exp(true);}
function updPtcl(){particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.vx*=.96;p.life--;});particles=particles.filter(p=>p.life>0);if(particles.length>400)particles.splice(0,80);}
function drawPtcl(){particles.forEach(p=>{X.globalAlpha=p.life/p.ml;X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.sz*(p.life/p.ml),0,Math.PI*2);X.fill();});X.globalAlpha=1;}

// ─── PLAYER ───────────────────────────────────────────────
class Player{
  constructor(type){
    this.type=type;this.x=W/2;this.y=H-120;
    this.hp=type===0?3:4;this.mhp=this.hp;
    this.spd=type===0?5.8:4.5;this.sft=type===0?9:14;
    this.st=0;this.wl=0;this.sp=100;this.spCool=0;
    this.shield=0;this.inv=0;this.dmgFx=0;this.trail=[];
  }
  update(){
    let dx=0,dy=0;
    if(K.ArrowLeft||K.KeyA)dx=-1;if(K.ArrowRight||K.KeyD)dx=1;
    if(K.ArrowUp||K.KeyW)dy=-1;if(K.ArrowDown||K.KeyS)dy=1;
    if(tActive){const l=Math.hypot(tDX,tDY);if(l>8){const s=Math.min(l/40,1);dx=tDX/l*s;dy=tDY/l*s;}}
    const sp=this.spd*(dx&&dy?.707:1);
    this.x=clamp(this.x+dx*sp,22,W-22);this.y=clamp(this.y+dy*sp,44,H-52);
    this.trail.push({x:this.x,y:this.y+24});if(this.trail.length>12)this.trail.shift();
    if(--this.st<=0){this.fire();this.st=this.sft;}
    const specKey=K.Space||K.KeyX||(tSpec&&!tSpecFired);
    if(specKey&&this.sp>=100&&this.spCool<=0){this.special();if(tSpec)tSpecFired=true;}
    if(this.spCool>0)this.spCool--;
    if(this.sp<100)this.sp=Math.min(100,this.sp+.14);
    if(this.inv>0)this.inv--;if(this.dmgFx>0)this.dmgFx--;if(this.shield>0)this.shield--;
  }
  fire(){
    if(this.type===0){
      if(this.wl===0){bullets.push(mkB(this.x,this.y-30,0,-15,true,1,'l'));sfx.shoot();}
      else if(this.wl===1){bullets.push(mkB(this.x-10,this.y-28,0,-15,true,1,'l'));bullets.push(mkB(this.x+10,this.y-28,0,-15,true,1,'l'));sfx.shoot();}
      else{bullets.push(mkB(this.x,this.y-30,0,-16,true,2,'l'));bullets.push(mkB(this.x-13,this.y-27,-.45,-15,true,1,'l'));bullets.push(mkB(this.x+13,this.y-27,.45,-15,true,1,'l'));sfx.shoot();}
    }else{
      if(this.wl===0){bullets.push(mkB(this.x-11,this.y-28,0,-10,true,2,'r'));bullets.push(mkB(this.x+11,this.y-28,0,-10,true,2,'r'));sfx.rocket();}
      else if(this.wl===1){for(let i=-1;i<=1;i++)bullets.push(mkB(this.x+i*12,this.y-28,i*.35,-10,true,2,'r'));sfx.rocket();}
      else{for(let i=-2;i<=2;i++)bullets.push(mkB(this.x+i*11,this.y-28,i*.42,-11,true,2+(Math.abs(i)<2?1:0),'r'));sfx.rocket();}
    }
  }
  special(){
    this.sp=0;this.spCool=200;
    if(this.type===0){
      let ts=enemies.filter(e=>!e.dead).sort((a,b)=>a.y-b.y).slice(0,8);
      if(boss&&!boss.dead)ts=[boss,...ts.slice(0,7)];
      ts.forEach((t,i)=>setTimeout(()=>{if(G.state==='playing'&&!t.dead){bullets.push(mkGuided(this.x,this.y,t));sfx.rocket();}},i*70));
      ptcl(this.x,this.y,'#ffee88',24);shk(5);
    }else{
      if(G.bombs>0){G.bombs--;for(let i=0;i<20;i++)setTimeout(()=>{if(G.state==='playing'){bullets.push(mkB(rnd(20,W-20),-10,0,14,true,3,'b'));sfx.exp();}},i*55);shk(7);}
      else{for(let a=-2;a<=2;a++)for(let i=0;i<3;i++)setTimeout(()=>bullets.push(mkB(this.x,this.y-28,a*.7,-12,true,2,'r')),i*40);ptcl(this.x,this.y,'#ff8800',16);shk(5);}
    }
  }
  hit(d=1){
    if(this.inv>0)return;
    if(this.shield>0){this.shield=0;shk(6);ptcl(this.x,this.y,'#00aaff',16);return;}
    this.hp-=d;this.inv=95;this.dmgFx=22;shk(10);ptcl(this.x,this.y,'#ff4400',22);sfx.exp();
    if(this.hp<=0){bigExp(this.x,this.y);G.state='over';}
  }
  draw(){
    this.trail.forEach((p,i)=>{const a=i/this.trail.length;X.fillStyle=`rgba(255,${this.type?120:80},0,${a*.3})`;X.beginPath();X.arc(p.x,p.y,4*a,0,Math.PI*2);X.fill();});
    X.save();
    if(this.dmgFx>0&&Math.floor(this.dmgFx/3)%2)X.globalAlpha=.2;
    else if(this.inv>0&&Math.floor(this.inv/5)%2)X.globalAlpha=.55;
    this.type===0?drawA29(this.x,this.y):drawA37(this.x,this.y);
    if(this.shield>0){X.globalAlpha=.5+Math.sin(frame*.02)*.2;X.strokeStyle='#00aaff';X.lineWidth=3;glow('#00aaff',14);X.beginPath();X.arc(this.x,this.y,38,0,Math.PI*2);X.stroke();noGlow();}
    X.globalAlpha=1;X.restore();
  }
}

// ─── BULLETS ──────────────────────────────────────────────
function mkB(x,y,vx,vy,friendly,dmg=1,type='l'){return{x,y,vx,vy,friendly,dmg,type,dead:false,life:240,ph:0};}
function mkGuided(x,y,tgt){return{x,y,vx:0,vy:-8,friendly:true,dmg:4,type:'g',dead:false,life:320,ph:0,tgt,spd:8,ang:-Math.PI/2};}

function updBullets(){
  bullets.forEach(b=>{
    if(b.dead)return;b.ph++;
    if(b.type==='g'&&b.tgt&&!b.tgt.dead){
      const da=Math.atan2(b.tgt.y-b.y,b.tgt.x-b.x)-b.ang;
      b.ang+=((da+3*Math.PI)%(2*Math.PI)-Math.PI)*.1;b.vx=Math.cos(b.ang)*b.spd;b.vy=Math.sin(b.ang)*b.spd;
    }
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.y<-40||b.y>H+40||b.x<-40||b.x>W+40||b.life<=0){b.dead=true;return;}
    if(b.friendly){
      enemies.forEach(e=>{if(!e.dead&&!b.dead&&dist(b,e)<e.r){e.hit(b.dmg);b.dead=true;ptcl(b.x,b.y,'#ffaa22',4);}});
      if(boss&&!boss.dead&&!b.dead&&dist(b,boss)<boss.r){boss.hit(b.dmg);b.dead=true;sfx.hit();}
    }else{if(player&&!b.dead&&dist(b,player)<20)player.hit(b.dmg);}
  });
  bullets=bullets.filter(b=>!b.dead);
}

function drawBullets(){
  bullets.forEach(b=>{X.save();
    if(b.friendly){
      if(b.type==='l'){glow('#ffe566',10);X.fillStyle='#fff8aa';X.fillRect(b.x-2,b.y-12,4,16);}
      else if(b.type==='r'){glow('#ff8800',8);X.fillStyle='#ffaa33';X.beginPath();X.ellipse(b.x,b.y,3.5,9,0,0,Math.PI*2);X.fill();X.fillStyle='rgba(255,80,0,.7)';X.fillRect(b.x-2,b.y+7,4,5);}
      else if(b.type==='b'){glow('#ff6600',12);X.fillStyle='#ff8800';X.beginPath();X.arc(b.x,b.y,7,0,Math.PI*2);X.fill();X.fillStyle='#ffdd00';X.beginPath();X.arc(b.x,b.y,3.5,0,Math.PI*2);X.fill();}
      else if(b.type==='g'){X.translate(b.x,b.y);X.rotate(b.ang+Math.PI/2);glow('#ff8800',12);X.fillStyle='#ffaa33';X.beginPath();X.moveTo(0,-11);X.lineTo(4.5,5);X.lineTo(-4.5,5);X.closePath();X.fill();X.fillStyle='rgba(255,160,60,.7)';X.beginPath();X.ellipse(0,9,2.5,6,0,0,Math.PI*2);X.fill();}
    }else{
      if(b.type==='beam'){glow('#ff3300',8);const g=X.createLinearGradient(b.x,b.y-14,b.x,b.y+4);g.addColorStop(0,'rgba(255,80,0,0)');g.addColorStop(.5,'rgba(255,60,0,.95)');g.addColorStop(1,'rgba(200,0,0,0)');X.fillStyle=g;X.fillRect(b.x-3,b.y-14,6,18);}
      else{glow('#00ff66',6);X.fillStyle=`rgba(0,${140+b.ph%100},60,.9)`;X.beginPath();X.arc(b.x,b.y,4.5,0,Math.PI*2);X.fill();}
    }
    noGlow();X.restore();});
}

// ─── ENEMIES ──────────────────────────────────────────────
class Enemy{
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;this.dead=false;this.ph=rnd(0,100);this.st=0;this.legPh=0;
    switch(type){
      case 'd': this.hp=1;this.r=14;this.sc=100;this.vx=rnd(-1.3,1.3);this.vy=rnd(1.8,2.8);this.st=rndI(70,120);break;
      case 'df':this.hp=1;this.r=12;this.sc=150;this.vx=rnd(-2.2,2.2);this.vy=rnd(3.5,5.2);this.st=rndI(40,80);break;
      case 't': this.hp=6;this.r=24;this.sc=400;this.vx=(Math.random()<.5?-1:1)*1.5;this.vy=.6;this.st=rndI(40,70);break;
      case 'a': this.hp=4;this.r=20;this.sc=280;this.vx=rnd(-.5,.5);this.vy=.4;this.st=rndI(90,150);break;
      case 'm': this.hp=28;this.r=32;this.sc=1200;this.vx=1.6;this.vy=.5;this.st=28;break;
    }
    this.mhp=this.hp;
  }
  update(){
    this.ph++;
    switch(this.type){
      case 'd':case 'df':
        this.x+=this.vx;this.y+=this.vy;this.vx+=rnd(-.09,.09);this.vx=clamp(this.vx,-4.5,4.5);
        if(this.x<14||this.x>W-14)this.vx*=-1;if(this.y>H+50){this.dead=true;return;}
        if(--this.st<=0&&this.y>0&&this.y<H*.6){bullets.push(mkB(this.x,this.y+12,0,4,false,1,'plasma'));this.st=rndI(60,110);}break;
      case 't':
        this.legPh++;this.x+=this.vx;this.y+=this.vy;
        if(this.x<24||this.x>W-24)this.vx*=-1;if(this.y>H+60){this.dead=true;return;}
        if(--this.st<=0&&this.y>-20){
          if(player){const dx=player.x-this.x,dy=player.y-this.y,l=Math.hypot(dx,dy);for(let i=0;i<3;i++)bullets.push(mkB(this.x,this.y,dx/l*3.2+rnd(-.5,.5),dy/l*3.2+rnd(-.5,.5),false,1,'beam'));}
          tone(100,.2,'sawtooth',.2);this.st=rndI(40,75);}break;
      case 'a':
        this.y+=Math.sin(this.ph*.016)*.55+.25;this.x+=this.vx;
        if(this.x<22||this.x>W-22)this.vx*=-1;if(this.y>H+50){this.dead=true;return;}
        if(--this.st<=0&&this.y>0&&this.y<H*.65){for(let i=0;i<6;i++){const a=i*Math.PI/3;bullets.push(mkB(this.x,this.y,Math.cos(a)*3.4,Math.sin(a)*3.4,false,1,'plasma'));}tone(160,.12,'square',.2);this.st=rndI(95,155);}break;
      case 'm':
        this.x+=Math.sin(this.ph*.022)*2.2+this.vx;
        if(this.y<180)this.y+=this.vy;else if(this.y>205)this.y-=.3;
        if(this.x<35||this.x>W-35)this.vx*=-1;
        if(--this.st<=0){for(let i=0;i<8;i++){const a=i*Math.PI/4+this.ph*.03;bullets.push(mkB(this.x,this.y,Math.cos(a)*4.2,Math.sin(a)*4.2,false,1,'plasma'));}sfx.exp();this.st=35;}break;
    }
  }
  hit(d){this.hp-=d;ptcl(this.x,this.y,'#00ff88',5);if(this.hp<=0){this.dead=true;addScore(this.sc);bigExp(this.x,this.y);if(Math.random()<.14)pups.push(new PUp(this.x,this.y));}}
  draw(){X.save();
    switch(this.type){
      case 'd': drawDrone(this.x,this.y,false);break;
      case 'df':drawDrone(this.x,this.y,true);break;
      case 't': drawTripod(this.x,this.y,this.hp,this.mhp,this.legPh);break;
      case 'a': drawArtillery(this.x,this.y,this.ph);break;
      case 'm': drawMiniboss(this.x,this.y,this.ph,this.hp,this.mhp);break;
    }X.restore();}
}

// ─── BOSS ─────────────────────────────────────────────────
class Boss{
  constructor(lvl){this.lvl=lvl;this.x=W/2;this.y=-150;this.tY=110;this.dead=false;this.entering=true;this.ph=0;this.timer=0;this.apt=0;this.apn=0;this.phase2=false;
    switch(lvl){case 0:this.hp=100;this.r=65;this.sc=10000;break;case 1:this.hp=150;this.r=70;this.sc=15000;break;default:this.hp=200;this.r=72;this.sc=20000;}this.mhp=this.hp;}
  update(){this.timer++;this.ph++;
    if(this.entering){this.y=lerp(this.y,this.tY,.038);if(Math.abs(this.y-this.tY)<5){this.y=this.tY;this.entering=false;}return;}
    this.x=W/2+Math.sin(this.ph*.013)*160;this.apt--;
    if(this.apt<=0){this.attack();this.apt=this.phase2?48:65;this.apn=(this.apn+1)%3;}
    if(this.hp<=this.mhp*.45&&!this.phase2){this.phase2=true;shk(18);sfx.exp(true);ptcl(this.x,this.y,'#ff4400',40);}
  }
  attack(){const s=this.phase2?5.2:3.8;
    if(this.apn===0&&player){const dx=player.x-this.x,dy=player.y-this.y,l=Math.hypot(dx,dy);
      bullets.push(mkB(this.x,this.y+38,dx/l*s,dy/l*s,false,1,'plasma'));
      if(this.phase2){bullets.push(mkB(this.x-14,this.y+38,dx/l*s+.8,dy/l*s,false,1,'plasma'));bullets.push(mkB(this.x+14,this.y+38,dx/l*s-.8,dy/l*s,false,1,'plasma'));}
    }else if(this.apn===1){const n=this.phase2?18:10;for(let i=0;i<n;i++){const a=i/n*Math.PI*2+this.timer*.04;bullets.push(mkB(this.x,this.y,Math.cos(a)*s,Math.sin(a)*s,false,1,'plasma'));}tone(130,.2,'square',.3);}
    else{for(let i=-3;i<=3;i++){bullets.push(mkB(this.x+i*24,this.y+30,0,s,false,1,'beam'));}if(this.phase2)for(let i=-2;i<=2;i++){bullets.push(mkB(this.x+i*24,this.y+30,.7,s,false,1,'beam'));bullets.push(mkB(this.x+i*24,this.y+30,-.7,s,false,1,'beam'));}tone(180,.15,'sawtooth',.25);}
  }
  hit(d){this.hp-=d;ptcl(this.x,this.y,'#00ffcc',7);shk(3);
    if(this.hp<=0){this.dead=true;addScore(this.sc);bigExp(this.x,this.y);G.bombs=Math.min(9,G.bombs+1);for(let i=0;i<8;i++)setTimeout(()=>bigExp(this.x+rnd(-80,80),this.y+rnd(-70,70)),i*140);}}
  draw(){X.save();drawBoss(this.lvl,this.x,this.y,this.timer,this.phase2);X.restore();drawBossHPBar();}
}

// ─── POWER-UPS ────────────────────────────────────────────
class PUp{
  constructor(x,y){this.x=x;this.y=y;this.dead=false;this.life=460;this.ph=0;this.type=['w','s','b'][rndI(0,2)];}
  update(){this.y+=1.4;this.ph++;this.life--;if(this.y>H+20||this.life<=0){this.dead=true;return;}if(player&&dist(this,player)<24)this.collect();}
  collect(){this.dead=true;sfx.pu();if(this.type==='w')player.wl=Math.min(2,player.wl+1);else if(this.type==='s')player.shield=350;else G.bombs=Math.min(9,G.bombs+1);}
  draw(){const c={w:'#ffaa00',s:'#00aaff',b:'#ff4400'}[this.type];const l={w:'W',s:'S',b:'B'}[this.type];
    X.save();X.translate(this.x,this.y);X.rotate(this.ph*.05);glow(c,16);
    X.fillStyle='rgba(0,0,0,.7)';X.beginPath();for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;X.lineTo(Math.cos(a)*15,Math.sin(a)*15);}X.closePath();X.fill();
    X.strokeStyle=c;X.lineWidth=2;X.stroke();noGlow();
    X.fillStyle='#fff';X.font='bold 12px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(l,0,0);X.textBaseline='alphabetic';X.restore();}
}

// ─── SPAWNER ──────────────────────────────────────────────
const SPAWN_SCRIPTS=[
  [{t:80,tp:'vee',n:3},{t:200,tp:'vee',n:5},{t:330,tp:'t',n:2},{t:460,tp:'a',n:2},{t:590,tp:'sw',n:8},{t:710,tp:'t',n:3},{t:850,tp:'m',n:1},{t:1010,tp:'sw',n:10},{t:1220,tp:'boss'}],
  [{t:70,tp:'t',n:2},{t:180,tp:'sw',n:7},{t:300,tp:'t',n:4},{t:430,tp:'a',n:3},{t:560,tp:'sw',n:11},{t:700,tp:'t',n:5},{t:840,tp:'m',n:2},{t:1010,tp:'sw',n:13},{t:1220,tp:'boss'}],
  [{t:60,tp:'sw',n:10},{t:170,tp:'t',n:4},{t:290,tp:'a',n:5},{t:420,tp:'sw',n:14},{t:550,tp:'t',n:6},{t:680,tp:'a',n:6},{t:820,tp:'sw',n:16},{t:960,tp:'m',n:3},{t:1160,tp:'boss'}],
];

function mkSpawns(lvl){return [...SPAWN_SCRIPTS[Math.min(lvl,2)]];}

function processSpawns(){
  if(G.bossOn)return;
  while(spawnQ.length&&spawnQ[0].t<=G.lvlT){
    const ev=spawnQ.shift();
    if(ev.tp==='boss'){G.bossOn=true;enemies.forEach(e=>e.dead=true);boss=new Boss(G.level);G.bossWarn=120;sfx.warn();return;}
    for(let i=0;i<ev.n;i++){
      setTimeout(()=>{
        if(G.state!=='playing')return;
        let x=ev.tp==='vee'?W/2+(i-ev.n/2)*40:rnd(20,W-20),y=-40;
        if(ev.tp==='vee')y=-30-Math.abs(i-ev.n/2)*20;
        const tp={vee:'d',t:'t',a:'a',sw:'d',m:'m'}[ev.tp]||'d';
        const type=ev.tp==='sw'&&Math.random()<.35?'df':tp;
        enemies.push(new Enemy(x,y,type));
      },i*(ev.tp==='sw'?32:ev.tp==='m'?400:85));
    }
  }
}

// ─── SCREENS ──────────────────────────────────────────────
function drawTitle(){
  // Video background
  if(titleVidReady && TITLEVID.readyState>=2){
    if(TITLEVID.paused)TITLEVID.play().catch(function(){});
    // Scale video to fill canvas (cover)
    var vw=TITLEVID.videoWidth||W, vh=TITLEVID.videoHeight||H;
    var scale=Math.max(W/vw, H/vh);
    var dw=vw*scale, dh=vh*scale;
    var dx=(W-dw)/2, dy=(H-dh)/2;
    X.drawImage(TITLEVID, dx, dy, dw, dh);
    // Dark overlay so text stays readable
    X.fillStyle='rgba(0,0,0,.52)';X.fillRect(0,0,W,H);
  } else {
    // Fallback: static dark sky
    X.fillStyle='#1a2840';X.fillRect(0,0,W,H);
    for(let i=0;i<80;i++){const sx=(i*93+frame*.04)%W,sy=(i*137)%H;const br=.3+ph(i*11)*.7;X.fillStyle=`rgba(255,255,255,${br*.7})`;X.fillRect(sx,sy,br>.8?2:1,1);}
    // Try to start the video (needs user interaction on mobile)
    if(!titleVidReady)TITLEVID.load();
  }
  // City silhouette
  X.fillStyle='#243650';
  X.beginPath();X.moveTo(0,H);
  [[0,.86],[.04,.78],[.09,.72],[.14,.80],[.19,.66],[.24,.74],[.29,.60],[.34,.58],
   [.355,.44],[.37,.42],[.385,.44],[.41,.68],[.44,.62],[.50,.70],[.55,.58],[.60,.65],
   [.65,.54],[.70,.62],[.75,.72],[.80,.64],[.85,.74],[.90,.68],[.95,.76],[1,.82],[1,1]]
  .forEach(([px,py])=>X.lineTo(px*W,py*H));X.closePath();X.fill();
  // Fires on skyline
  for(let i=0;i<5;i++){
    const fx=W*.15+i*W*.17,fy=H*.62+Math.sin(i*.7)*H*.06;
    const g=X.createRadialGradient(fx,fy,0,fx,fy,18);g.addColorStop(0,'rgba(255,180,30,.8)');g.addColorStop(.5,'rgba(255,60,0,.4)');g.addColorStop(1,'rgba(200,20,0,0)');
    X.fillStyle=g;X.beginPath();X.ellipse(fx,fy,10,14+Math.sin(frame*.2+i)*4,0,0,Math.PI*2);X.fill();
  }
  // Plane
  X.save();X.translate(W/2+Math.sin(frame*.015)*60,H*.42+Math.sin(frame*.04)*10);X.scale(.9,.9);drawA29(0,0);X.restore();
  // Title box
  X.fillStyle='rgba(0,0,0,.7)';X.fillRect(30,H*.18,W-60,90);
  X.strokeStyle='rgba(180,130,40,.7)';X.lineWidth=1.5;X.strokeRect(30,H*.18,W-60,90);
  corners(30,H*.18,W-60,90,12,'#aa8830');
  glow('#ff8800',18);X.fillStyle='#ffaa22';X.font='bold 18px monospace';X.textAlign='center';X.fillText('ATAQUE DE PÁNICO',W/2,H*.18+36);noGlow();
  glow('#ff4400',14);X.fillStyle='#ff5500';X.font='bold 14px monospace';X.fillText('MONTEVIDEO 2099',W/2,H*.18+60);noGlow();
  X.fillStyle='rgba(200,160,80,.6)';X.font='9px monospace';X.fillText('Inspirado en el corto de Federico Alvarez',W/2,H*.18+80);
  // Blink
  if(Math.sin(frame*.055)>0){glow('#ffcc00',8);X.fillStyle='#ffe566';X.font='bold 12px monospace';X.fillText('TOCÁ / PRESIONÁ CUALQUIER TECLA',W/2,H*.8);noGlow();}
  X.fillStyle='rgba(120,90,30,.5)';X.font='9px monospace';X.fillText(`FAU — Fuerza Aérea Uruguaya  ·  HI: ${fmt(G.hi)}`,W/2,H-10);
}

  X.fillStyle='#111e2e';X.fillRect(0,0,W,H);
  metalRect(0,0,W,52);corners(0,0,W,52,16,'#7a6030');goldTxt('ELEGÍ TU AERONAVE',W/2,34,16);
  const PD=[
    {name:'A-29 SUPER TUCANO',sub:'PRECISION STRIKE',stats:[4,4,3,3],sp:'ATAQUE QUIRÚRGICO\nMisiles guiados · Lock-on',fn:drawA29},
    {name:'A-37 DRAGONFLY',sub:'HEAVY FIREPOWER',stats:[3,3,5,4],sp:'SATURACIÓN AÉREA\nBombardeo masivo · BOMB',fn:drawA37},
  ];
  PD.forEach((p,i)=>{
    const bx=12+i*(W/2-6),bw=W/2-18,by=60,bh=H-112;

    X.strokeStyle=sel?'#aa7722':'rgba(60,50,20,.5)';X.lineWidth=sel?2.5:1;X.strokeRect(bx,by,bw,bh);
    if(sel)corners(bx,by,bw,bh,10,'#aa7722');
    metalRect(bx+2,by+2,bw-4,22,sel?'#2e1a00':'#0e0c08',sel?'#4a2e0a':'#1a1610',sel?'#aa7722':'rgba(80,60,20,.4)');
    X.fillStyle=sel?'#ffcc44':'#886633';X.font='bold 9px monospace';X.textAlign='center';X.fillText(p.name,bx+bw/2,by+16);
    glow(sel?'#88aaff':'#668844',8);X.fillStyle=sel?'#aaccff':'#88bb66';X.font='bold 8px monospace';X.fillText(p.sub,bx+bw/2,by+34);noGlow();
    X.save();X.translate(bx+bw/2,by+98);X.scale(1.6,1.6);p.fn(0,0);X.restore();
    const SN=['VEL','MAN','DMG','DEF'];
    p.stats.forEach((v,si)=>{
      const sy=by+156+si*20;X.fillStyle='rgba(200,160,80,.45)';X.font='8px monospace';X.textAlign='left';X.fillText(SN[si],bx+8,sy+9);
      X.fillStyle='rgba(0,0,0,.5)';X.fillRect(bx+36,sy,bw-44,10);
      X.fillStyle=sel?'#ffaa00':'#556628';X.fillRect(bx+37,sy+1,(bw-46)*v/5,8);
      X.strokeStyle='rgba(120,90,30,.4)';X.lineWidth=1;X.strokeRect(bx+36,sy,bw-44,10);
    });
    metalRect(bx+6,by+244,bw-12,50,'#08100a','#101e12','rgba(0,180,80,.3)');
    X.fillStyle='rgba(100,220,140,.6)';X.font='bold 7px monospace';X.textAlign='center';X.fillText('ESPECIAL',bx+bw/2,by+258);
    X.fillStyle='rgba(255,255,255,.75)';X.font='8px monospace';
    p.sp.split('\n').forEach((l,li)=>X.fillText(l,bx+bw/2,by+272+li*14));
    if(sel){glow('#ffcc00',12);X.fillStyle='#ffe566';X.font='bold 11px monospace';X.fillText('TOCÁ DE NUEVO → INICIAR',bx+bw/2,by+bh-14);noGlow();}
    else{X.fillStyle='rgba(120,90,30,.5)';X.font='9px monospace';X.fillText('TOCÁ PARA ELEGIR',bx+bw/2,by+bh-14);}
  });
  metalRect(0,H-36,W,36);X.fillStyle='rgba(200,160,80,.5)';X.font='9px monospace';X.textAlign='center';X.fillText('← → ELEGIR  ·  ESPACIO CONFIRMAR  ·  TOCÁ DOS VECES PARA INICIAR',W/2,H-14);
}

function drawWarning(){
  const a=Math.min(1,G.bossWarn>90?(120-G.bossWarn)/30:G.bossWarn/30);
  X.fillStyle=`rgba(80,0,0,${a*.55})`;X.fillRect(0,0,W,H);
  if(Math.sin(frame*.25)>.2){
    glow('#ff0000',30);metalRect(20,H*.38,W-40,76,'#220000','#440000','#cc0000');
    corners(20,H*.38,W-40,76,10,'#ff0000');
    X.fillStyle='#ff0000';X.font='bold 38px monospace';X.textAlign='center';X.fillText('WARNING!',W/2,H*.38+52);noGlow();
    X.fillStyle='rgba(255,180,60,.8)';X.font='10px monospace';X.fillText(['NODRIZA ALIENÍGENA','ROBOT DESTRUCTOR','ACORAZADO ALIEN'][G.level]+' APPROACHING',W/2,H*.38+70);
  }
}

function drawLevelBanner(){
  if(G.lvlT>160)return;
  const a=G.lvlT<55?G.lvlT/55:Math.max(0,(160-G.lvlT)/55);
  X.save();X.globalAlpha=a;X.fillStyle='rgba(0,0,0,.55)';X.fillRect(0,H*.4,W,88);
  metalRect(20,H*.42,W-40,62,'#0a0c08','#141e10','rgba(100,160,60,.5)');
  corners(20,H*.42,W-40,62,8,'rgba(100,160,60,.7)');
  goldTxt(`LEVEL ${G.level+1}`,W/2,H*.42+24,11);
  X.fillStyle='rgba(255,255,255,.9)';X.font='bold 16px monospace';X.textAlign='center';
  X.fillText(['RAMBLA SUR','CENTRO · PALACIO SALVO','PUERTO · CIUDAD VIEJA'][G.level],W/2,H*.42+50);
  X.restore();
}

function drawGameOver(){
  X.fillStyle='rgba(0,0,0,.75)';X.fillRect(0,0,W,H);
  metalRect(20,H*.3,W-40,102,'#150000','#2a0000','#880000');
  corners(20,H*.3,W-40,102,10,'#ff2200');
  glow('#ff0000',22);X.fillStyle='#ee1100';X.font='bold 38px monospace';X.textAlign='center';
  X.fillText('MISSION',W/2,H*.3+50);X.fillText('FAILED',W/2,H*.3+90);noGlow();
  metalRect(60,H*.63,W-120,38,'#0a0c08','#141610','rgba(120,90,30,.5)');
  X.fillStyle='rgba(255,200,80,.85)';X.font='14px monospace';X.textAlign='center';X.fillText(`SCORE: ${fmt(G.score)}`,W/2,H*.63+24);
  if(Math.sin(frame*.055)>0){X.fillStyle='rgba(255,230,100,.75)';X.font='11px monospace';X.fillText('TOCÁ / ESPACIO PARA REINTENTAR',W/2,H*.84);}
}

function drawWin(){
  X.fillStyle='rgba(0,0,0,.8)';X.fillRect(0,0,W,H);
  metalRect(10,40,W-20,46,'#0a1008','#162014','#00cc55');
  corners(10,40,W-20,46,12,'#00ff88');
  glow('#00ff88',18);X.strokeStyle='#00ff88';X.lineWidth=2;X.strokeRect(11,41,W-22,44);noGlow();
  X.fillStyle='#00ff88';X.font='bold 20px monospace';X.textAlign='center';X.fillText('¡INVASIÓN REPELIDA!',W/2,73);
  if(G.score>=G.hi){glow('#ffff00',10);X.fillStyle='#ffff44';X.font='bold 12px monospace';X.fillText('★ NUEVO RÉCORD ★',W/2,H*.45);noGlow();}
  X.fillStyle='rgba(255,220,100,.9)';X.font='15px monospace';X.fillText(`SCORE: ${fmt(G.score)}`,W/2,H*.55);
  if(Math.sin(frame*.055)>0){X.fillStyle='rgba(200,200,200,.7)';X.font='11px monospace';X.fillText('TOCÁ PARA VOLVER AL MENÚ',W/2,H*.75);}
}

// ─── GAME INIT ────────────────────────────────────────────
function startGame(){
  TITLEVID.pause();TITLEVID.currentTime=0;
  G.state='playing';G.level=0;G.score=0;G.combo=0;G.comboT=0;G.bombs=2;G.bgY=0;G.lvlT=0;G.bossOn=false;G.bossWarn=0;
  bullets=[];enemies=[];particles=[];pups=[];boss=null;
  spawnQ=mkSpawns(0);player=new Player(G.sel);
  tone(330,.1,'sine',.3);setTimeout(()=>tone(440,.1,'sine',.3),120);setTimeout(()=>tone(550,.2,'sine',.3),240);
}
function nextLevel(){
  G.level++;G.bgY=0;G.lvlT=0;G.bossOn=false;G.bossWarn=0;
  bullets=[];enemies=[];particles=[];pups=[];boss=null;
  spawnQ=mkSpawns(G.level);
  if(player){player.wl=Math.max(0,player.wl-1);player.hp=Math.min(player.mhp,player.hp+1);player.x=W/2;player.y=H-120;player.sp=100;player.inv=90;}
}

// ─── MAIN LOOP ────────────────────────────────────────────
let waitNext=0;
function loop(){
  requestAnimationFrame(loop);frame++;
  let ox=0,oy=0;if(shakeAmt>.3){ox=rnd(-shakeAmt,shakeAmt);oy=rnd(-shakeAmt,shakeAmt);shakeAmt*=.82;}else shakeAmt=0;
  X.save();X.translate(ox,oy);

  if(G.state==='title'){
    // Resume video on title
    if(titleVidReady&&TITLEVID.paused)TITLEVID.play().catch(function(){});
    drawTitle();
    if(anyKey){anyKey=false;sfx.sel();G.state='select';}
  }
  else if(G.state==='select'){
    drawSelect();
    if(K.ArrowLeft||K.KeyA){G.sel=0;K.ArrowLeft=K.KeyA=false;sfx.sel();}
    if(K.ArrowRight||K.KeyD){G.sel=1;K.ArrowRight=K.KeyD=false;sfx.sel();}
    if(K.Space||K.Enter){K.Space=K.Enter=false;startGame();}
    if(K.Escape){K.Escape=false;G.state='title';}
  }
  else if(G.state==='playing'){
    G.lvlT++;G.bgY+=1.4;
    if(G.comboT>0)G.comboT--;else G.combo=0;
    if(player&&!player.dead)player.update();
    updBullets();
    enemies.forEach(e=>{if(!e.dead)e.update();});enemies=enemies.filter(e=>!e.dead);
    if(boss&&!boss.dead)boss.update();
    if(boss&&boss.dead){boss=null;G.bossOn=false;if(G.level>=2){if(G.score>G.hi)G.hi=G.score;G.state='win';}else{waitNext=0;G.state='next';}}
    updPtcl();pups.forEach(p=>p.update());pups=pups.filter(p=>!p.dead);
    processSpawns();if(bullets.length>550)bullets.splice(0,100);
    if(G.bossWarn>0)G.bossWarn--;
    // Draw
    drawBG();drawPtcl();pups.forEach(p=>p.draw());drawBullets();
    enemies.forEach(e=>{if(!e.dead)e.draw();});
    if(boss&&!boss.dead)boss.draw();
    if(player&&!player.dead)player.draw();
    drawHUD();drawLevelBanner();
    if(G.bossWarn>0)drawWarning();
  }
  else if(G.state==='next'){
    drawBG();drawPtcl();drawHUD();
    waitNext++;X.fillStyle=`rgba(0,0,0,${Math.min(.7,waitNext/50)})`;X.fillRect(0,0,W,H);
    if(waitNext>40){metalRect(20,H*.38,W-40,78,'#021408','#042e14','#00cc55');corners(20,H*.38,W-40,78,10,'#00ff88');glow('#00ff88',14);X.fillStyle='#00ff88';X.font='bold 18px monospace';X.textAlign='center';X.fillText('ZONA LIBERADA',W/2,H*.38+38);noGlow();X.fillStyle='rgba(200,255,200,.7)';X.font='11px monospace';X.fillText(`AVANZANDO A NIVEL ${G.level+2}...`,W/2,H*.38+62);}
    if(waitNext>180){nextLevel();G.state="playing";waitNext=0;}
  }
  else if(G.state==='over'){
    drawBG();drawPtcl();drawHUD();drawGameOver();
    if(K.Space){K.Space=false;startGame();}
    if(K.Escape){K.Escape=false;G.state='title';Object.keys(K).forEach(k=>K[k]=false);}
  }
  else if(G.state==='win'){
    drawBG();drawWin();
    if(anyKey){anyKey=false;G.state='title';Object.keys(K).forEach(k=>K[k]=false);}
  }
  X.restore();
}

requestAnimationFrame(loop);
</script>
